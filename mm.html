<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>رابط مخفي - طبقات متعددة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 700px;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 28px;
            text-align: center;
        }

        h1 span {
            background: linear-gradient(135deg, #00ff87, #60efff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff87;
            font-weight: 600;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00ff87;
            background: rgba(255, 255, 255, 0.15);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 15px 0;
        }

        .checkbox-item {
            flex: 1;
            min-width: 120px;
        }

        .checkbox-item label {
            color: #ddd;
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .preview-box {
            background: rgba(0, 255, 135, 0.05);
            border: 1px solid rgba(0, 255, 135, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
        }

        .preview-title {
            color: #00ff87;
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .preview-content {
            color: white;
            word-break: break-all;
            font-family: monospace;
            font-size: 13px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .primary-btn {
            background: linear-gradient(135deg, #00ff87, #60efff);
            color: #1a1a2e;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 255, 135, 0.4);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 255, 135, 0.1);
            border: 1px solid #00ff87;
            border-radius: 10px;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .layers-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
        }

        .layer {
            flex: 1;
            text-align: center;
            padding: 5px;
            color: #888;
            font-size: 12px;
            position: relative;
        }

        .layer.active {
            color: #00ff87;
        }

        .layer.active::after {
            content: '✓';
            position: absolute;
            top: -15px;
            right: 50%;
            transform: translateX(50%);
            color: #00ff87;
            font-size: 16px;
        }

        .final-url {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            word-break: break-all;
        }

        .final-url a {
            color: #60efff;
            text-decoration: none;
            font-family: monospace;
        }

        .copy-btn {
            background: #00ff87;
            color: #1a1a2e;
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            font-weight: bold;
        }

        .warning {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
            border-top: 1px solid rgba(255, 107, 107, 0.3);
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇮​​​​​🇱​​​​​🇬​​​​​🇦​​​​​🇲 <span>الروابط</span></h1>
        <div class="subtitle">إخفاء الرابط الحقيقي بطبقات متعددة من التمويه</div>

        <div class="input-section">
            <label>🎯 الرابط الأصلي (الحقيقي)</label>
            <input type="text" id="originalUrl" placeholder="https://your-server.com/page?id=739226288" value="https://your-server.com/page?id=739226288">
            
            <label>🆔 معرف المستخدم</label>
            <input type="text" id="targetId" placeholder="739226288" value="739226288">
        </div>

        <div class="input-section">
            <label>🔧 طبقات التلغيم</label>
            
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <label>
                        <input type="checkbox" id="layer1" checked> 
                        🎭 Google Redirect
                    </label>
                </div>
                <div class="checkbox-item">
                    <label>
                        <input type="checkbox" id="layer2" checked> 
                        🔄 Facebook Proxy
                    </label>
                </div>
                <div class="checkbox-item">
                    <label>
                        <input type="checkbox" id="layer3" checked> 
                        📱 TikTok Shortener
                    </label>
                </div>
                <div class="checkbox-item">
                    <label>
                        <input type="checkbox" id="layer4"> 
                        🕵️ Cloudflare Shield
                    </label>
                </div>
                <div class="checkbox-item">
                    <label>
                        <input type="checkbox" id="layer5"> 
                        🔐 Telegram Gateway
                    </label>
                </div>
            </div>
        </div>

        <div class="input-section">
            <label>🌐 شكل الرابط النهائي</label>
            <select id="urlStyle">
                <option value="tiktok">tiktok.com/@video/ID</option>
                <option value="youtube">youtube.com/shorts/ID</option>
                <option value="instagram">instagram.com/reel/ID</option>
                <option value="google">google.com/search?q=ID</option>
                <option value="facebook">facebook.com/watch/ID</option>
                <option value="amazon">amazon.com/dp/ID</option>
                <option value="spotify">spotify.com/track/ID</option>
                <option value="random" selected>رابط عشوائي متغير</option>
            </select>
        </div>

        <div class="preview-box">
            <div class="preview-title">
                <span>📋 معاينة طبقات الإخفاء</span>
            </div>
            <div class="preview-content" id="previewLayers">
                انتظر...
            </div>
        </div>

        <div class="button-group">
            <button class="primary-btn" onclick="generateMinedUrl()">💣 توليد الرابط الملغم</button>
            <button class="secondary-btn" onclick="resetForm()">🔄 إعادة ضبط</button>
        </div>

        <div class="result-box" id="resultBox">
            <div class="layers-indicator" id="layersIndicator">
                <div class="layer" id="layer1Indicator">طبقة 1</div>
                <div class="layer" id="layer2Indicator">طبقة 2</div>
                <div class="layer" id="layer3Indicator">طبقة 3</div>
                <div class="layer" id="layer4Indicator">طبقة 4</div>
                <div class="layer" id="layer5Indicator">طبقة 5</div>
            </div>

            <div class="final-url">
                <a href="#" id="finalLink" target="_blank"></a>
                <button class="copy-btn" onclick="copyFinalUrl()">نسخ</button>
            </div>

            <div style="color: #888; font-size: 12px; margin-top: 10px;">
                ⚡ الرجع النهائي محمي بـ 3 طبقات إخفاء
            </div>
            
            <div class="warning">
                ⚠️ الرابط يعمل فقط على الأجهزة المستهدفة. يستحيل تتبع الرابط الأصلي.
            </div>
        </div>
    </div>

    <script>
        // ====== إعدادات التلغيم ======
        const REDIRECT_SERVICES = [
            'https://www.google.com/url?q=',
            'https://l.facebook.com/l.php?u=',
            'https://out.reddit.com/t3_1/url=',
            'https://linkedin.com/redirect?url=',
            'https://www.bing.com/news/apiclick.aspx?url='
        ];

        const SHORTENERS = [
            'https://tinyurl.com/api-create.php?url=',
            'https://is.gd/create.php?format=simple&url=',
            'https://v.gd/create.php?format=simple&url=',
            'https://short.link/',
            'https://rb.gy/'
        ];

        const PROXY_SITES = [
            'https://proxy.google.com/',
            'https://proxy.fb.com/',
            'https://cdn.cloudflare.com/',
            'https://redirect.telegram.org/'
        ];

        function generateMinedUrl() {
            const targetId = document.getElementById('targetId').value.trim();
            const originalUrl = document.getElementById('originalUrl').value.trim();
            const urlStyle = document.getElementById('urlStyle').value;
            
            if (!targetId) {
                alert('الرجاء إدخال معرف المستخدم');
                return;
            }

            // بناء الرابط الأصلي
            let realUrl = originalUrl;
            if (!realUrl.includes('?')) {
                realUrl = `https://your-server.com/page?id=${targetId}`;
            }

            // تطبيق طبقات التلغيم
            let minedUrl = realUrl;
            const layers = [];

            if (document.getElementById('layer1').checked) {
                // طبقة 1: Google Redirect
                const randomRedirect = REDIRECT_SERVICES[Math.floor(Math.random() * REDIRECT_SERVICES.length)];
                minedUrl = randomRedirect + encodeURIComponent(minedUrl);
                layers.push('Google');
                document.getElementById('layer1Indicator').classList.add('active');
            } else {
                document.getElementById('layer1Indicator').classList.remove('active');
            }

            if (document.getElementById('layer2').checked) {
                // طبقة 2: Facebook Proxy
                const randomProxy = PROXY_SITES[Math.floor(Math.random() * PROXY_SITES.length)];
                minedUrl = randomProxy + '?url=' + encodeURIComponent(minedUrl);
                layers.push('Facebook');
                document.getElementById('layer2Indicator').classList.add('active');
            } else {
                document.getElementById('layer2Indicator').classList.remove('active');
            }

            if (document.getElementById('layer3').checked) {
                // طبقة 3: TikTok Shortener (وهمي)
                if (urlStyle === 'tiktok') {
                    minedUrl = `https://tiktok.com/@video/${targetId}?redirect=${encodeURIComponent(minedUrl)}`;
                } else if (urlStyle === 'youtube') {
                    minedUrl = `https://youtube.com/shorts/${targetId}?next=${encodeURIComponent(minedUrl)}`;
                } else if (urlStyle === 'instagram') {
                    minedUrl = `https://instagram.com/reel/${targetId}?url=${encodeURIComponent(minedUrl)}`;
                } else {
                    minedUrl = `https://tiktok.com/@user/video/${targetId}?r=${encodeURIComponent(minedUrl)}`;
                }
                layers.push('TikTok');
                document.getElementById('layer3Indicator').classList.add('active');
            } else {
                document.getElementById('layer3Indicator').classList.remove('active');
            }

            if (document.getElementById('layer4').checked) {
                // طبقة 4: Cloudflare Shield
                minedUrl = `https://cf-cdn.com/secure/${btoa(minedUrl)}`;
                layers.push('Cloudflare');
                document.getElementById('layer4Indicator').classList.add('active');
            } else {
                document.getElementById('layer4Indicator').classList.remove('active');
            }

            if (document.getElementById('layer5').checked) {
                // طبقة 5: Telegram Gateway
                minedUrl = `https://t.me/iv?url=${encodeURIComponent(minedUrl)}&rhash=${Math.random().toString(36).substring(7)}`;
                layers.push('Telegram');
                document.getElementById('layer5Indicator').classList.add('active');
            } else {
                document.getElementById('layer5Indicator').classList.remove('active');
            }

            // تحديث المعاينة
            document.getElementById('previewLayers').innerHTML = 
                `الرابط الأصلي: ${realUrl}<br>` +
                `→ بعد التلغيم: ${minedUrl.substring(0, 100)}...`;

            // عرض النتيجة
            document.getElementById('finalLink').href = minedUrl;
            document.getElementById('finalLink').textContent = minedUrl.length > 60 ? minedUrl.substring(0, 60) + '...' : minedUrl;
            document.getElementById('resultBox').classList.add('show');
        }

        function copyFinalUrl() {
            const finalUrl = document.getElementById('finalLink').href;
            navigator.clipboard.writeText(finalUrl).then(() => {
                alert('✅ تم نسخ الرابط الملغم');
            });
        }

        function resetForm() {
            document.getElementById('targetId').value = '739226288';
            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('previewLayers').innerHTML = 'انتظر...';
            
            // إعادة تعيين المؤشرات
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`layer${i}Indicator`).classList.remove('active');
            }
        }

        // تحديث المعاينة المبدئية
        window.onload = function() {
            resetForm();
        };
    </script>
</body>
  </html>
