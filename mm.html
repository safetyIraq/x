<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>رابط مختصر - أداة احترافية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 600px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
            text-align: center;
        }

        h1 span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .url-preview {
            background: #f0f3ff;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            border: 2px dashed #667eea;
            word-break: break-all;
            font-family: monospace;
            color: #333;
        }

        .url-preview span {
            color: #667eea;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .primary-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .secondary-btn {
            background: #f0f0f0;
            color: #333;
        }

        .secondary-btn:hover {
            background: #e0e0e0;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-right: 4px solid #28a745;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-title {
            color: #28a745;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .short-url {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .short-url a {
            color: #007bff;
            text-decoration: none;
            word-break: break-all;
        }

        .short-url a:hover {
            text-decoration: underline;
        }

        .copy-btn {
            background: #28a745;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #218838;
        }

        .info-text {
            color: #666;
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>رابط <span>مختصر</span></h1>
        
        <div class="input-group">
            <label>🔗 الرابط الأصلي</label>
            <input type="url" id="originalUrl" placeholder="https://example.com/page?id=123456789..." dir="ltr">
        </div>

        <div class="input-group">
            <label>🎯 نوع الرابط المختصر</label>
            <select id="shortType">
                <option value="tiny">TinyURL (قصير جداً)</option>
                <option value="isgd">is.gd (احترافي)</option>
                <option value="vgd">v.gd (سريع)</option>
                <option value="custom" selected>رابط مخصص</option>
            </select>
        </div>

        <div class="input-group" id="customDomainGroup">
            <label>🌐 الرابط المخصص</label>
            <select id="customDomain">
                <option value="tiktok.com">tiktok.com/video</option>
                <option value="youtube.com">youtube.com/shorts</option>
                <option value="instagram.com">instagram.com/reel</option>
                <option value="facebook.com">facebook.com/watch</option>
                <option value="google.com">google.com/search</option>
                <option value="custom">رابط مخصص آخر</option>
            </select>
        </div>

        <div class="url-preview" id="urlPreview">
            <span>🔍 معاينة الرابط:</span><br>
            <span id="previewText"></span>
        </div>

        <div class="button-group">
            <button class="primary-btn" onclick="shortenUrl()">🔗 توليد الرابط</button>
            <button class="secondary-btn" onclick="resetForm()">🔄 إعادة تعيين</button>
        </div>

        <div class="result-box" id="resultBox">
            <div class="result-title">
                <span>✅ تم توليد الرابط بنجاح</span>
            </div>
            <div class="short-url">
                <a href="#" id="shortLink" target="_blank"></a>
                <button class="copy-btn" onclick="copyToClipboard()">نسخ</button>
            </div>
            <div class="info-text">
                الرابط صالح للاستخدام المباشر. اضغط على الرابط لنسخه.
            </div>
        </div>
    </div>

    <script>
        // ====== إعدادات التوليد ======
        const token = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";
        
        function generateOriginalUrl() {
            const id = document.getElementById('originalUrl').value.trim();
            
            if (!id) {
                alert('الرجاء إدخال الرابط الأصلي');
                return null;
            }
            
            // استخراج id من الرابط إذا كان رابط كامل
            let targetId = id;
            if (id.includes('id=')) {
                const match = id.match(/id=(\d+)/);
                if (match) targetId = match[1];
            }
            
            return `https://t.me/BotFatherBot?start=${targetId}`;
        }

        function updatePreview() {
            const url = generateOriginalUrl();
            if (url) {
                document.getElementById('previewText').textContent = url;
            }
        }

        // ====== خدمات تقصير الروابط ======
        async function shortenWithTinyURL(longUrl) {
            try {
                const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
                return await response.text();
            } catch (error) {
                return null;
            }
        }

        async function shortenWithIsGd(longUrl) {
            try {
                const response = await fetch(`https://is.gd/create.php?format=simple&url=${encodeURIComponent(longUrl)}`);
                return await response.text();
            } catch (error) {
                return null;
            }
        }

        async function shortenWithVGd(longUrl) {
            try {
                const response = await fetch(`https://v.gd/create.php?format=simple&url=${encodeURIComponent(longUrl)}`);
                return await response.text();
            } catch (error) {
                return null;
            }
        }

        function createCustomShort(longUrl, domain) {
            // استخراج id من الرابط
            const match = longUrl.match(/start=(\d+)/);
            const id = match ? match[1] : 'video';
            
            // اختيار المسار حسب الدومين
            let path = '';
            switch(domain) {
                case 'tiktok.com':
                    path = `@video/${id}`;
                    break;
                case 'youtube.com':
                    path = `shorts/${id}`;
                    break;
                case 'instagram.com':
                    path = `reel/${id}`;
                    break;
                case 'facebook.com':
                    path = `watch?v=${id}`;
                    break;
                case 'google.com':
                    path = `search?q=${id}`;
                    break;
                default:
                    path = `watch/${id}`;
            }
            
            return `https://${domain}/${path}`;
        }

        async function shortenUrl() {
            const originalUrl = generateOriginalUrl();
            if (!originalUrl) return;
            
            const shortType = document.getElementById('shortType').value;
            const customDomain = document.getElementById('customDomain').value;
            
            let shortUrl = null;
            
            // إظهار حالة التحميل
            document.getElementById('resultBox').classList.remove('show');
            
            try {
                switch(shortType) {
                    case 'tiny':
                        shortUrl = await shortenWithTinyURL(originalUrl);
                        break;
                    case 'isgd':
                        shortUrl = await shortenWithIsGd(originalUrl);
                        break;
                    case 'vgd':
                        shortUrl = await shortenWithVGd(originalUrl);
                        break;
                    case 'custom':
                        shortUrl = createCustomShort(originalUrl, customDomain);
                        break;
                }
                
                if (shortUrl) {
                    document.getElementById('shortLink').href = shortUrl;
                    document.getElementById('shortLink').textContent = shortUrl;
                    document.getElementById('resultBox').classList.add('show');
                    
                    // حفظ في السجل المحلي
                    saveToHistory(originalUrl, shortUrl);
                } else {
                    alert('فشل في توليد الرابط، الرجاء المحاولة مرة أخرى');
                }
                
            } catch (error) {
                alert('حدث خطأ: ' + error.message);
            }
        }

        function copyToClipboard() {
            const shortLink = document.getElementById('shortLink').href;
            navigator.clipboard.writeText(shortLink).then(() => {
                alert('✅ تم نسخ الرابط');
            }).catch(() => {
                alert('❌ فشل النسخ');
            });
        }

        function resetForm() {
            document.getElementById('originalUrl').value = '';
            document.getElementById('previewText').textContent = '';
            document.getElementById('resultBox').classList.remove('show');
        }

        function saveToHistory(original, shortened) {
            let history = JSON.parse(localStorage.getItem('urlHistory') || '[]');
            history.unshift({
                original: original,
                shortened: shortened,
                date: new Date().toLocaleString()
            });
            history = history.slice(0, 10); // احتفظ بآخر 10
            localStorage.setItem('urlHistory', JSON.stringify(history));
        }

        // تحديث المعاينة عند الكتابة
        document.getElementById('originalUrl').addEventListener('input', updatePreview);
    </script>
</body>
</html>
